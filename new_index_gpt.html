<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#f4f6fa;font-family:Arial}
.wrap{padding:12px}

.top{display:grid;grid-template-columns:1.2fr 1fr;gap:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.card{
 background:#fff;
 border-radius:14px;
 padding:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.title{font-size:12px;font-weight:700;margin-bottom:6px}

.item{
 display:flex;
 justify-content:space-between;
 font-size:12px;
 margin:2px 0;
}

canvas{height:50px!important}

.news-item{padding:8px 0;border-bottom:1px solid #eee;font-size:13px}

.section{margin-top:14px}

.scroll{display:flex;gap:8px;overflow-x:auto}

.theme,.etf{
 min-width:130px;
 background:#fff;
 padding:8px;
 border-radius:10px;
 cursor:pointer;
}

.list-row{
 display:flex;
 justify-content:space-between;
 padding:8px 0;
 border-bottom:1px solid #eee;
 cursor:pointer;
}

/* 상세 테이블 */
.detail{
 margin-top:10px;
 font-size:12px;
}

.detail-row{
 display:flex;
 justify-content:space-between;
 padding:4px 0;
 border-bottom:1px dashed #eee;
}

.badge{
 padding:2px 6px;
 border-radius:4px;
 font-size:11px;
}

.buy{background:#dcfce7;color:#166534}
.sell{background:#fee2e2;color:#991b1b}
.neutral{background:#e5e7eb;color:#374151}
</style>
</head>

<body>
<div class="wrap">

<!-- 상단 -->
<div class="top">

<div class="grid">

<!-- 주식 -->
<div class="card">
<div class="title">주식</div>
<div class="item"><span>AAPL</span><span>+1.2%</span></div>
<div class="item"><span>TSLA</span><span>-0.5%</span></div>
<canvas id="c1"></canvas>
</div>

<!-- 지수 -->
<div class="card">
<div class="title">지수</div>
<div class="item"><span>NASDAQ</span><span>+1.1%</span></div>
<div class="item"><span>S&P500</span><span>+0.8%</span></div>
<canvas id="c2"></canvas>
</div>

<!-- 외환 -->
<div class="card">
<div class="title">외환</div>
<div class="item"><span>USD/KRW</span><span>+0.4%</span></div>
<div class="item"><span>EUR/USD</span><span>-0.2%</span></div>
<canvas id="c3"></canvas>
</div>

<!-- 원자재 -->
<div class="card">
<div class="title">원자재</div>
<div class="item"><span>Gold</span><span>+0.7%</span></div>
<div class="item"><span>WTI</span><span>+1.2%</span></div>
<canvas id="c4"></canvas>
</div>

</div>

<div class="card">
<div class="title">🔥 뉴스</div>
<div class="news-item">금리 인하 기대 확대</div>
<div class="news-item">AI 반도체 수요 증가</div>
</div>

</div>

<!-- 주식 -->
<div class="section card">

<div class="title">📊 주식 시세</div>

<div class="scroll">
<div class="theme">반도체</div>
<div class="theme">AI</div>
<div class="theme">방산</div>
</div>

<div class="list-row" onclick="showStock('삼성전자')">삼성전자</div>
<div class="list-row" onclick="showStock('SK하이닉스')">SK하이닉스</div>

<div id="stock-detail" class="detail"></div>

</div>

<!-- ETF -->
<div class="section card">

<div class="title">📦 ETF</div>

<div class="scroll">
<div class="etf" onclick="showETF('SPY')">SPY</div>
<div class="etf" onclick="showETF('QQQ')">QQQ</div>
<div class="etf" onclick="showETF('EEM')">EEM</div>
<div class="etf" onclick="showETF('EFA')">EFA</div>
<div class="etf" onclick="showETF('GDX')">GDX</div>
<div class="etf" onclick="showETF('USO')">USO</div>
</div>

<div id="etf-detail" class="detail"></div>

</div>

</div>

<script>
function chart(id){
 const d=Array.from({length:20},()=>Math.random()*100)
 new Chart(document.getElementById(id),{
  type:'line',
  data:{labels:d.map((_,i)=>i),datasets:[{data:d,tension:0.4,pointRadius:0}]},
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
 })
}
["c1","c2","c3","c4"].forEach(chart)

// 상세 표시
function showStock(name){
 document.getElementById('stock-detail').innerHTML = `
  <div class="detail-row"><span>종가</span><span>72,000</span></div>
  <div class="detail-row"><span>고가</span><span>73,000</span></div>
  <div class="detail-row"><span>저가</span><span>70,500</span></div>
  <div class="detail-row"><span>변동</span><span>+1.2%</span></div>
  <div class="detail-row"><span>거래량</span><span>1.2M</span></div>
  <div class="detail-row"><span>YTD</span><span>+12%</span></div>
  <div class="detail-row"><span>1년</span><span>+25%</span></div>
  <div class="detail-row"><span>3년</span><span>+60%</span></div>
  <div class="detail-row"><span>트렌드</span><span class="badge buy">매수</span></div>
 `;
}

function showETF(name){
 document.getElementById('etf-detail').innerHTML = `
  <div class="detail-row"><span>${name} 종가</span><span>520</span></div>
  <div class="detail-row"><span>YTD</span><span>+10%</span></div>
  <div class="detail-row"><span>1년</span><span>+18%</span></div>
  <div class="detail-row"><span>트렌드</span><span class="badge neutral">중립</span></div>
 `;
}
</script>

</body>
</html>
