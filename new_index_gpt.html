<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Daily Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6fa;font-family:Arial,sans-serif;font-size:13px}
.wrap{padding:8px}
h2{text-align:center;font-size:14px;margin:8px 0 10px;text-decoration:underline;font-weight:700}
.top{display:grid;grid-template-columns:1.3fr 1fr;gap:8px;margin-bottom:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#fff;border-radius:10px;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-weight:700;font-size:12px;margin-bottom:4px}
.tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:4px}
.tab{background:transparent;border:none;font-size:9px;font-weight:700;color:#888;padding:2px 5px;border-radius:4px;cursor:pointer;font-family:Arial}
.tab.on{background:#e8f0fe;color:#1d4ed8}
.chart-box{position:relative;height:55px;margin:4px 0}
.row{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:2px 0;border-bottom:1px solid #f4f4f4}
.row:last-child{border-bottom:none}
.rn{font-weight:600;color:#222}
.up{color:#16a34a}.down{color:#dc2626}.flat{color:#888}
/* 뉴스 */
.ntab{background:transparent;border:1px solid #e0e0e0;border-radius:12px;font-size:9px;font-weight:700;color:#888;padding:2px 8px;cursor:pointer;font-family:Arial}
.ntab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.ni{padding:5px 0;border-bottom:1px solid #f4f4f4;cursor:pointer}
.ni:last-child{border-bottom:none}
.ns{font-size:9px;color:#1d4ed8;font-weight:700;margin-bottom:1px}
.nt{font-size:11px;line-height:1.4;color:#111}
.nt:hover{color:#1d4ed8}
/* 섹션 */
.sec{background:#fff;border-radius:10px;padding:8px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sec-title{font-weight:700;font-size:12px;margin-bottom:6px}
.scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
/* 테마 칩 */
.chip{background:#f0f4ff;color:#1d4ed8;border:none;border-radius:14px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Arial}
.chip.on{background:#1d4ed8;color:#fff}
/* ETF 카드 */
.etfc{min-width:108px;background:#f8fafc;border:1px solid #e8edf5;border-radius:8px;padding:6px 8px}
.etfn{font-size:9px;font-weight:700;color:#1d4ed8;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.etfp{font-size:13px;font-weight:800;color:#111}
.etfch{font-size:10px;font-weight:600;margin-top:1px}
.etfsp{height:28px;margin-top:4px}
/* 테이블 */
.tw{overflow-x:auto;margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{background:#f8fafc;color:#888;font-weight:700;padding:5px 4px;text-align:right;border-bottom:1px solid #eee;white-space:nowrap}
th:first-child{text-align:left}
td{padding:4px;text-align:right;border-bottom:1px solid #f4f4f4;white-space:nowrap;color:#222}
td:first-child{text-align:left;font-weight:700}
tr:hover td{background:#f8fafc}
.updated{text-align:center;font-size:9px;color:#bbb;padding:6px 0 14px}
</style>
</head>
<body>
<div class="wrap">
<h2>Investment Daily Dashboard</h2>

<div class="top">
  <div class="grid4">
    <div class="card">
      <div class="card-title">주식</div>
      <div class="tabs" id="t1"></div>
      <div class="chart-box"><canvas id="c1"></canvas></div>
      <div id="m1"></div>
    </div>
    <div class="card">
      <div class="card-title">지수</div>
      <div class="tabs" id="t2"></div>

      <div id="m2"></div>
    </div>
    <div class="card">
      <div class="card-title">외환</div>

      <div class="chart-box"><canvas id="c3"></canvas></div>
      <div id="m3"></div>
    </div>
    <div class="card">

</div>

<div class="sec">
  <div class="sec-title">📊 주식 시세</div>
  <div class="scroll" id="themes"></div>
  <div class="tw">
    <table><thead><tr>

    </tr></thead><tbody id="stb"></tbody></table>

</div>

    <table><thead><tr>

    </tr></thead><tbody id="etftb"></tbody></table>

</div>

<div class="updated" id="upd"></div>
</div>

<script>
// ══════════════════════════════════════

    {src:'머니투데이',title:'코스피 2,570선 회복…외국인 순매수 전환에 상승',url:'#'},

// ══════════════════════════════════════
// 설정
// ══════════════════════════════════════
const PROXIES = [

  u => 'https://corsproxy.io/?' + encodeURIComponent(u),

const SECTIONS = [

  {cid:'c2',tid:'t2',mid:'m2',data:DUMMY.indexes, color:'#7c3aed',key:'indexes'},
  {cid:'c3',tid:'t3',mid:'m3',data:DUMMY.fx,      color:'#dc2626',key:'fx'},
  {cid:'c4',tid:'t4',mid:'m4',data:DUMMY.commodity,color:'#d97706',key:'commodity'},
];
const SYMBOLS = {
  stocks:   [{n:'AAPL',s:'AAPL'},{n:'TSLA',s:'TSLA'},{n:'NVDA',s:'NVDA'},{n:'MSFT',s:'MSFT'},{n:'BABA',s:'BABA'},{n:'BAC',s:'BAC'}],
  indexes:  [{n:'코스피',s:'^KS11'},{n:'코스닥',s:'^KQ11'},{n:'S&P500',s:'^GSPC'},{n:'나스닥',s:'^IXIC'},{n:'Tech100',s:'^NDX'},{n:'니케이',s:'^N225'}],
  fx:       [{n:'달러/원',s:'USDKRW=X'},{n:'엔/달러',s:'USDJPY=X'},{n:'유로/달러',s:'EURUSD=X'},{n:'위안/달러',s:'USDCNY=X'},{n:'달러인덱스',s:'DX-Y.NYB'}],
  commodity:[{n:'금',s:'GC=F'},{n:'은',s:'SI=F'},{n:'WTI',s:'CL=F'},{n:'구리',s:'HG=F'},{n:'천연가스',s:'NG=F'}],
  etf:      [{n:'SPDR S&P500',s:'SPY'},{n:'인베스코QQQ',s:'QQQ'},{n:'iShares EM',s:'EEM'},{n:'iShares EAFE',s:'EFA'},{n:'VanEck Gold',s:'GDX'},{n:'US Oil',s:'USO'}],
  stktbl:   [{n:'삼성전자',s:'005930.KS'},{n:'SK하이닉스',s:'000660.KS'},{n:'현대차',s:'005380.KS'},{n:'NAVER',s:'035420.KS'},{n:'카카오',s:'035720.KS'},{n:'셀트리온',s:'068270.KS'},{n:'한화에어로',s:'012450.KS'},{n:'LG에너지',s:'373220.KS'}],
};
const NEWS_SRC = [{name:'한국경제',url:'https://feeds.hankyung.com/app/stock.xml'},{name:'매일경제',url:'https://www.mk.co.kr/rss/30100041/'},{name:'머니투데이',url:'https://news.mt.co.kr/mtview/rss/stock.xml'}];
const IKW = ['주식','증시','코스피','코스닥','나스닥','S&P','금리','환율','달러','유가','채권','ETF','펀드','투자','실적','경제','연준','Fed','반도체','배당','IPO','삼성','하이닉스'];
const EKW = ['연예','드라마','아이돌','가수','배우','축구','야구','패션','뷰티','맛집'];

// ══════════════════════════════════════
// 상태
// ══════════════════════════════════════
const chartInst = {};
const secState  = {}; // {key: {range,interval,idx}}
SECTIONS.forEach(s => { secState[s.key] = {range:'1d',interval:'5m',idx:0}; });
let allNews = [...DUMMY.news];
let etfSparks = [];

// ══════════════════════════════════════
// 유틸
// ══════════════════════════════════════
function fmt(v, dec=2) {
  if (v === null || v === undefined || isNaN(v)) return '-';
  return Number(v).toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function clsCh(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }
function signStr(v) { return v > 0 ? '+' : ''; }
function dummySpark() { return Array.from({length:20},(_,i)=>50+Math.sin(i/3)*10+Math.random()*5); }

// ══════════════════════════════════════
// API fetch (프록시 3개 폴백)
// ══════════════════════════════════════
async function yfetch(symbol, interval, range) {
  const base = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol) + '?interval=' + interval + '&range=' + range;
  for (const proxyFn of PROXIES) {
    try {
      const r = await fetch(proxyFn(base), {signal: AbortSignal.timeout(4000)});
      if (!r.ok) continue;
      const j = await r.json();
      if (j?.chart?.result?.[0]) return j;
    } catch(e) {}
  }
  return null;
}

// ══════════════════════════════════════
// 미니 차트
// ══════════════════════════════════════
async function drawChart(sec) {
  const {cid, color, key} = sec;
  const st = secState[key];
  const sym = SYMBOLS[key][st.idx].s;
  if (chartInst[cid]) { chartInst[cid].destroy(); delete chartInst[cid]; }

  let closes = null, labels = null;
  const data = await yfetch(sym, st.interval, st.range);
  if (data) {
    try {
      closes = data.chart.result[0].indicators.quote[0].close.map(v => v ?? null);
      labels  = data.chart.result[0].timestamp.map(t => {
        const d = new Date(t*1000);
        return (st.interval==='5m'||st.interval==='1h')
          ? d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')
          : (d.getMonth()+1)+'/'+d.getDate();
      });
    } catch(e) {}
  }
  if (!closes) { closes = dummySpark(); labels = closes.map((_,i)=>i); }

  const ctx = document.getElementById(cid).getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,55);
  grad.addColorStop(0, color+'30'); grad.addColorStop(1, color+'00');
  chartInst[cid] = new Chart(ctx, {
    type:'line',
    data:{labels, datasets:[{data:closes, borderColor:color, backgroundColor:grad, tension:.4, pointRadius:0, borderWidth:1.8, fill:true, spanGaps:true}]},
    options:{responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false}}}
  });
}

// ══════════════════════════════════════
// 리스트 렌더
// ══════════════════════════════════════
function renderList(mid, items, liveData) {
  const el = document.getElementById(mid);
  el.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    let price = item.p, chg = item.c;
    if (liveData && liveData[i]) {
      try {
        const meta = liveData[i].chart.result[0].meta;
        price = meta.regularMarketPrice;
        chg = price - meta.chartPreviousClose;
      } catch(e) {}
    }
    const pct = item.p ? (chg/item.p*100).toFixed(2) : '0.00';
    const cls = clsCh(chg);
    row.innerHTML = `<span class="rn">${item.n}</span><span class="${cls}">${fmt(price,2)} <small>${signStr(chg)}${Number(pct)}%</small></span>`;
    el.appendChild(row);
  });
}

// ══════════════════════════════════════
// 범위 탭 생성
// ══════════════════════════════════════
function buildTabs(sec) {
  const {tid, key, cid, color, mid, data} = sec;
  const el = document.getElementById(tid);
  const TABS = [{l:'1일',r:'1d',i:'5m'},{l:'1주',r:'5d',i:'1h'},{l:'1달',r:'1mo',i:'1d'},{l:'3달',r:'3mo',i:'1wk'},{l:'1년',r:'1y',i:'1mo'}];
  el.innerHTML = '';
  TABS.forEach((t,idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (idx===0?' on':'');
    btn.textContent = t.l;
    btn.onclick = () => {
      el.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      secState[key].range = t.r;
      secState[key].interval = t.i;
      drawChart(sec);
    };
    el.appendChild(btn);
  });
}

// ══════════════════════════════════════
// 섹션 로드 (차트 + 리스트)
// ══════════════════════════════════════
async function loadSection(sec) {
  buildTabs(sec);
  const {key, mid, data} = sec;
  const syms = SYMBOLS[key];
  // 리스트: 더미로 먼저 표시
  renderList(mid, data, null);
  // 실제 데이터 시도
  const results = await Promise.all(syms.map(s => yfetch(s.s,'1d','5d')));
  renderList(mid, data, results);
  // 차트
  await drawChart(sec);
}

// ══════════════════════════════════════
// 주식 테이블
// ══════════════════════════════════════
async function loadStockTable() {
  const tbody = document.getElementById('stb');
  // 더미 먼저
  tbody.innerHTML = DUMMY.stocktable.map(d => {
    const cls = clsCh(d.c);
    return `<tr>
      <td>${d.n}</td>
      <td>${d.p.toLocaleString()}</td>
      <td class="${cls}">${signStr(d.c)}${d.c.toLocaleString()}</td>
      <td class="${cls}">${signStr(d.pct)}${d.pct}%</td>
      <td>${d.vol.toLocaleString()}</td>
      <td>${d.h.toLocaleString()}</td>
      <td>${d.l.toLocaleString()}</td>
    </tr>`;
  }).join('');
  // 실제 데이터 시도
  const results = await Promise.all(SYMBOLS.stktbl.map(s => yfetch(s.s,'1d','5d')));
  const rows = SYMBOLS.stktbl.map((s,i) => {
    try {
      const meta = results[i].chart.result[0].meta;
      const p = meta.regularMarketPrice;
      const prev = meta.chartPreviousClose;
      const c = p - prev;
      const pct = (c/prev*100);
      const cls = clsCh(c);
      return `<tr>
        <td>${s.n}</td>
        <td>${p.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
        <td class="${cls}">${signStr(c)}${c.toFixed(0)}</td>
        <td class="${cls}">${signStr(pct)}${pct.toFixed(2)}%</td>
        <td>${(meta.regularMarketVolume||0).toLocaleString()}</td>
        <td>${(meta.regularMarketDayHigh||0).toLocaleString(undefined,{maximumFractionDigits:0})}</td>
        <td>${(meta.regularMarketDayLow||0).toLocaleString(undefined,{maximumFractionDigits:0})}</td>
      </tr>`;
    } catch(e) {
      const d = DUMMY.stocktable[i];
      const cls = clsCh(d.c);
      return `<tr>
        <td>${s.n}</td>
        <td>${d.p.toLocaleString()}</td>
        <td class="${cls}">${signStr(d.c)}${d.c}</td>
        <td class="${cls}">${signStr(d.pct)}${d.pct}%</td>
        <td>${d.vol.toLocaleString()}</td>
        <td>${d.h.toLocaleString()}</td>
        <td>${d.l.toLocaleString()}</td>
      </tr>`;
    }
  });
  tbody.innerHTML = rows.join('');
}

// ══════════════════════════════════════
// ETF
// ══════════════════════════════════════
async function loadETF() {
  const cardWrap = document.getElementById('etfcards');
  const tbody    = document.getElementById('etftb');
  etfSparks.forEach(c => c&&c.destroy());
  etfSparks = [];

  // 더미 먼저
  renderETF(DUMMY.etf, null, cardWrap, tbody);
  // 실제
  const results = await Promise.all(SYMBOLS.etf.map(s => yfetch(s.s,'1d','5d')));
  renderETF(DUMMY.etf, results, cardWrap, tbody);
}

function renderETF(dummies, results, cardWrap, tbody) {
  etfSparks.forEach(c=>c&&c.destroy());
  etfSparks = [];
  cardWrap.innerHTML = '';
  tbody.innerHTML = '';

  dummies.forEach((d, i) => {
    let price = d.p, chg = d.c, spark = dummySpark();
    if (results && results[i]) {
      try {
        const meta = results[i].chart.result[0].meta;
        price = meta.regularMarketPrice;
        chg = price - meta.chartPreviousClose;
        spark = (results[i].chart.result[0].indicators.quote[0].close||[]).filter(v=>v!=null);
      } catch(e) {}
    }
    const pct = (chg/price*100).toFixed(2);
    const cls = clsCh(chg);

    // 카드
    const card = document.createElement('div');
    card.className = 'etfc';
    card.innerHTML = `
      <div class="etfn">${d.n}</div>
      <div class="etfp">${fmt(price,2)}</div>
      <div class="etfch ${cls}">${signStr(chg)}${fmt(chg,2)} ${signStr(+pct)}${pct}%</div>
      <div class="etfsp"><canvas id="es${i}"></canvas></div>`;
    cardWrap.appendChild(card);

    // 테이블
    const vol = results&&results[i] ? (results[i].chart.result[0].meta.regularMarketVolume||0).toLocaleString() : '-';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${d.n}</td><td>${fmt(price,2)}</td><td class="${cls}">${signStr(chg)}${fmt(chg,2)}</td><td class="${cls}">${signStr(+pct)}${pct}%</td><td>${vol}</td>`;
    tbody.appendChild(tr);

    // 스파크
    setTimeout(()=>{
      const cv = document.getElementById('es'+i);
      if (!cv) return;
      const isUp = spark[spark.length-1] >= spark[0];
      etfSparks[i] = new Chart(cv,{
        type:'line',
        data:{labels:spark.map((_,j)=>j),datasets:[{data:spark,borderColor:isUp?'#16a34a':'#dc2626',borderWidth:1.2,pointRadius:0,tension:.4,fill:false}]},
        options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
      });
    }, 80);
  });
}

// ══════════════════════════════════════
// 뉴스
// ══════════════════════════════════════
async function loadNews() {
  // 더미 먼저 표시
  allNews = [...DUMMY.news];
  renderNews('all');

  // 실제 RSS 시도
  const fetches = NEWS_SRC.map(src => {
    const url = src.url;
    return (async () => {
      for (const proxyFn of PROXIES) {
        try {
          const r = await fetch(proxyFn(url), {signal:AbortSignal.timeout(4000)});
          if (!r.ok) continue;
          const text = await r.text();
          return {name: src.name, text};
        } catch(e) {}
      }
      return null;
    })();
  });
  const results = await Promise.all(fetches);
  const liveNews = [];
  results.forEach(res => {
    if (!res) return;
    try {
      const xml = new DOMParser().parseFromString(res.text,'text/xml');
      let cnt = 0;
      for (const item of xml.querySelectorAll('item')) {
        if (cnt >= 5) break;
        const title = item.querySelector('title')?.textContent?.trim()||'';
        const url   = item.querySelector('link')?.textContent?.trim()||'#';
        if (!title) continue;
        if (EKW.some(k=>title.includes(k))) continue;
        if (!IKW.some(k=>title.includes(k))) continue;
        liveNews.push({src:res.name, title, url});
        cnt++;
      }
    } catch(e) {}
  });
  if (liveNews.length > 0) {
    allNews = liveNews;
    renderNews('all');
  }
}

function renderNews(tab) {
  const el = document.getElementById('news');
  const items = tab==='hot' ? allNews.slice(0,3) : allNews;
  el.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'ni';
    div.innerHTML = `<div class="ns">📌 ${item.src}</div><div class="nt" onclick="window.open('${item.url||'#'}','_blank')">${item.title}</div>`;
    el.appendChild(div);
  });
}

function filterNews(tab, btn) {
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderNews(tab);
}

// ══════════════════════════════════════
// 테마 칩
// ══════════════════════════════════════
function buildThemes() {
  const el = document.getElementById('themes');
  THEMES_LIST.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (i===0?' on':'');
    btn.textContent = t;
    btn.onclick = () => {
      document.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
    };
    el.appendChild(btn);
  });
}

// ══════════════════════════════════════
// 초기화
// ══════════════════════════════════════
async function init() {
  buildThemes();
  await Promise.all([
    ...SECTIONS.map(sec => loadSection(sec)),
    loadNews(),
    loadStockTable(),
    loadETF(),
  ]);
  document.getElementById('upd').textContent = '마지막 업데이트: ' + new Date().toLocaleString('ko-KR');
}

init();
setInterval(init, 300000);
</script>
