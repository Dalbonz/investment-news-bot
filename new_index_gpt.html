<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#f3f5f9;font-family:Arial}

.wrap{padding:12px}

.top{
 display:grid;
 grid-template-columns:1.2fr 1fr;
 gap:10px;
}

/* 좌측 */
.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.card{
 background:#fff;
 border-radius:14px;
 padding:10px;
 box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.title{font-size:12px;font-weight:700;margin-bottom:6px}

.item{
 display:flex;
 justify-content:space-between;
 font-size:12px;
 margin:2px 0;
}

.up{color:#16a34a}
.down{color:#dc2626}

/* 뉴스 */
.news-item{
 padding:8px 0;
 border-bottom:1px solid #eee;
 font-size:13px;
 cursor:pointer;
}

.badge{
 font-size:10px;
 background:#fef3c7;
 padding:2px 6px;
 border-radius:4px;
 margin-right:4px;
}

/* 하단 */
.section{margin-top:14px}

.row{
 display:flex;
 justify-content:space-between;
 padding:8px 0;
 border-bottom:1px solid #eee;
 cursor:pointer;
}

.etf-scroll{
 display:flex;
 gap:8px;
 overflow-x:auto;
}

.etf{
 min-width:120px;
 padding:8px;
 background:#fff;
 border-radius:10px;
 cursor:pointer;
}

canvas{height:50px!important}
.small{height:30px!important}
</style>
</head>

<body>

<div class="wrap">

<div class="top">

<!-- 좌측 -->
<div class="grid">

<!-- 주식 -->
<div class="card">
<div class="title">주식</div>

<div class="item"><span>삼성전자</span><span class="up">+1.2%</span></div>
<div class="item"><span>TSLA</span><span class="down">-0.5%</span></div>

<canvas id="c1"></canvas>
</div>

<!-- 지수 -->
<div class="card">
<div class="title">지수</div>

<div class="item"><span>NASDAQ</span><span class="up">+1.2%</span></div>
<div class="item"><span>KOSPI</span><span class="down">-0.8%</span></div>

<canvas id="c2"></canvas>
</div>

<!-- 외환 -->
<div class="card">
<div class="title">외환</div>

<div class="item"><span>USD/KRW</span><span class="up">+0.4%</span></div>
<div class="item"><span>EUR/USD</span><span class="down">-0.2%</span></div>

<canvas id="c3"></canvas>
</div>

<!-- 원자재 -->
<div class="card">
<div class="title">원자재</div>

<div class="item"><span>금</span><span class="up">+0.8%</span></div>
<div class="item"><span>WTI</span><span class="up">+1.1%</span></div>

<canvas id="c4"></canvas>
</div>

</div>

<!-- 뉴스 -->
<div class="card">

<div class="title">🔥 뉴스</div>

<div class="news-item"><span class="badge">Reuters</span>금리 인하 기대 확대</div>
<div class="news-item"><span class="badge">MK</span>AI 반도체 수요 증가</div>
<div class="news-item"><span class="badge">HK</span>삼성전자 실적 호조</div>

</div>

</div>

<!-- 주식 테마 -->
<div class="section card">

<div class="title">📊 테마 (반도체 / AI / 방산)</div>

<div class="row" onclick="go('semiconductor')">
반도체
<canvas class="small" id="t1"></canvas>
</div>

<div class="row" onclick="go('ai')">
AI
<canvas class="small" id="t2"></canvas>
</div>

<div class="row" onclick="go('defense')">
방산
<canvas class="small" id="t3"></canvas>
</div>

</div>

<!-- ETF -->
<div class="section card">

<div class="title">📦 ETF</div>

<div class="etf-scroll">

<div class="etf" onclick="go('SPY')">
SPY
<canvas class="small" id="e1"></canvas>
</div>

<div class="etf" onclick="go('QQQ')">
QQQ
<canvas class="small" id="e2"></canvas>
</div>

<div class="etf" onclick="go('EEM')">
EEM
<canvas class="small" id="e3"></canvas>
</div>

</div>

</div>

</div>

<script>

// 개선된 차트
function chart(id){
 const d=Array.from({length:20},()=>Math.random()*100)
 const ctx=document.getElementById(id).getContext('2d')

 const grad=ctx.createLinearGradient(0,0,0,60)
 grad.addColorStop(0,'rgba(29,78,216,0.3)')
 grad.addColorStop(1,'rgba(29,78,216,0)')

 new Chart(ctx,{
  type:'line',
  data:{labels:d.map((_,i)=>i),
  datasets:[{
    data:d,
    borderColor:'#1d4ed8',
    backgroundColor:grad,
    fill:true,
    tension:0.4,
    pointRadius:0,
    borderWidth:2
  }]},
  options:{
    plugins:{legend:{display:false}},
    scales:{x:{display:false},y:{display:false}}
  }
 })
}

["c1","c2","c3","c4","t1","t2","t3","e1","e2","e3"].forEach(chart)

// 클릭 이동
function go(name){
 alert(name + " 상세페이지 (추후 연결)")
}

</script>

</body>
</html>
