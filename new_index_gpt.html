<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#f4f6fa;font-family:Arial}
.wrap{padding:10px}
.top{display:grid;grid-template-columns:1.3fr 1fr;gap:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#fff;border-radius:10px;padding:8px}
.row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.up{color:#16a34a}.down{color:#dc2626}
canvas{height:50px!important}
.news-item{padding:6px 0;border-bottom:1px solid #eee;font-size:12px}
.scroll{display:flex;gap:6px;overflow-x:auto}
.box{min-width:100px;background:#fff;padding:6px;border-radius:8px;font-size:11px}
.list-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee}
</style>
</head>

<body>
<div class="wrap">

<div class="top">
<div class="grid">

<div class="card">
주식
<canvas id="c1"></canvas>
<div id="stock-mini"></div>
</div>

<div class="card">
지수
<canvas id="c2"></canvas>
<div id="index-mini"></div>
</div>

<div class="card">
외환
<canvas id="c3"></canvas>
<div id="fx-mini"></div>
</div>

<div class="card">
원자재
<canvas id="c4"></canvas>
<div id="com-mini"></div>
</div>

</div>

<div class="card">
뉴스
<div id="news"></div>
</div>
</div>

<div class="card">
📊 주식 테마
<div class="scroll" id="theme"></div>
<div id="stocks"></div>
</div>

<div class="card">
📦 ETF
<div class="scroll" id="etf"></div>
</div>

</div>

<script>

// ✔ 더미 데이터 (무조건 뜨게)
const DATA = {
 stocks:[
  {n:"AAPL",p:189,c:1.2},
  {n:"TSLA",p:172,c:-0.8}
 ],
 index:[
  {n:"S&P",p:5200,c:0.5},
  {n:"NASDAQ",p:16200,c:0.7}
 ],
 fx:[
  {n:"USD/KRW",p:1380,c:0.3}
 ],
 commodity:[
  {n:"GOLD",p:2300,c:-0.2}
 ]
};

function render(id,list){
 let el=document.getElementById(id);
 el.innerHTML="";
 list.forEach(i=>{
  let d=document.createElement('div');
  d.className="row";
  d.innerHTML=`<span>${i.n}</span>
  <span class="${i.c>=0?'up':'down'}">${i.p}</span>`;
  el.appendChild(d);
 });
}

// 차트
function chart(id){
 let d=Array.from({length:20},()=>Math.random()*100);
 new Chart(document.getElementById(id),{
  type:'line',
  data:{labels:d.map((_,i)=>i),
  datasets:[{data:d,tension:.3,pointRadius:0}]},
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
 })
}

// 뉴스
function news(){
 let list=["금리 인하 기대","AI 상승","유가 반등"];
 let box=document.getElementById("news");
 list.forEach(t=>{
  let d=document.createElement("div");
  d.className="news-item";
  d.innerText=t;
  box.appendChild(d);
 });
}

// 테마
const THEMES=["반도체","AI","방산","바이오","건설"];
THEMES.forEach(t=>{
 let d=document.createElement("div");
 d.className="box";
 d.innerText=t;
 document.getElementById("theme").appendChild(d);
});

// ETF
["SPY","QQQ","EEM","EFA","GDX","USO"].forEach(e=>{
 let d=document.createElement("div");
 d.className="box";
 d.innerText=e;
 document.getElementById("etf").appendChild(d);
});

// 실행
render("stock-mini",DATA.stocks);
render("index-mini",DATA.index);
render("fx-mini",DATA.fx);
render("com-mini",DATA.commodity);

chart("c1");chart("c2");chart("c3");chart("c4");
news();

</script>

</body>
</html>
