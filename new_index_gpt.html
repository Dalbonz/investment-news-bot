<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#f4f6fa;font-family:Arial}
.wrap{padding:10px}
.top{display:grid;grid-template-columns:1.3fr 1fr;gap:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#fff;border-radius:10px;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.title{font-size:12px;font-weight:700;margin-bottom:6px}
.row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.up{color:#16a34a}.down{color:#dc2626}
canvas{height:40px!important}
.scroll{display:flex;gap:6px;overflow-x:auto}
.box{min-width:110px;background:#fff;border-radius:8px;padding:6px;font-size:11px;cursor:pointer}
.list-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:12px;cursor:pointer}
.detail{font-size:11px;margin-top:6px;border-top:1px solid #ddd;padding-top:6px}
.detail-row{display:flex;justify-content:space-between;padding:2px 0}
.news-item{font-size:12px;padding:6px 0;border-bottom:1px solid #eee}
</style>
</head>

<body>
<div class="wrap">

<div class="top">
<div class="grid">

<div class="card">
<div class="title">주식</div>
<canvas id="c1"></canvas>
<div id="stock-mini"></div>
</div>

<div class="card">
<div class="title">지수</div>
<canvas id="c2"></canvas>
<div id="index-mini"></div>
</div>

<div class="card">
<div class="title">외환</div>
<canvas id="c3"></canvas>
<div id="fx-mini"></div>
</div>

<div class="card">
<div class="title">원자재</div>
<canvas id="c4"></canvas>
<div id="com-mini"></div>
</div>

</div>

<div class="card">
<div class="title">뉴스</div>
<div id="news"></div>
</div>
</div>

<div class="card">
<div class="title">📊 주식</div>
<div class="scroll" id="theme"></div>
<div id="stocks"></div>
<div id="sdetail" class="detail"></div>
</div>

<div class="card">
<div class="title">📦 ETF</div>
<div class="scroll" id="etf"></div>
<div id="elist"></div>
<div id="edetail" class="detail"></div>
</div>

</div>

<script>
const P='https://api.allorigins.win/raw?url=';

async function Y(s){
 let u=`https://query1.finance.yahoo.com/v8/finance/chart/${s}?range=1mo&interval=1d`;
 let r=await fetch(P+encodeURIComponent(u));
 return r.json();
}

function chart(id,data){
 new Chart(document.getElementById(id),{
  type:'line',
  data:{labels:data.map((_,i)=>i),
  datasets:[{data,borderWidth:1,tension:.3,pointRadius:0}]},
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
 })
}

async function mini(symbols,box,canvas){
 let c=false;
 for(let s of symbols){
  try{
   let d=await Y(s);
   let m=d.chart.result[0].meta;
   let p=m.regularMarketPrice;
   let prev=m.chartPreviousClose;
   let ch=p-prev;
   let cls=ch>=0?'up':'down';

   let div=document.createElement('div');
   div.className='row';
   div.innerHTML=`<span>${s}</span><span class="${cls}">${ch.toFixed(2)}</span>`;
   box.appendChild(div);

   if(!c){
    let cl=d.chart.result[0].indicators.quote[0].close.filter(v=>v);
    chart(canvas,cl);
    c=true;
   }
  }catch(e){}
 }
}

mini(["AAPL","TSLA"],document.getElementById('stock-mini'),'c1');
mini(["^GSPC","^IXIC"],document.getElementById('index-mini'),'c2');
mini(["USDKRW=X","EURUSD=X"],document.getElementById('fx-mini'),'c3');
mini(["GC=F","CL=F"],document.getElementById('com-mini'),'c4');

const THEMES={
 "반도체":["005930.KS","000660.KS"],
 "AI":["035420.KS","035720.KS"],
 "방산":["012450.KS"],
 "바이오":["068270.KS"],
 "건설":["000720.KS"]
};

function renderTheme(){
 let t=document.getElementById('theme');
 Object.keys(THEMES).forEach(k=>{
  let d=document.createElement('div');
  d.className='box';
  d.innerText=k;
  d.onclick=()=>stocks(k);
  t.appendChild(d);
 });
}

async function stocks(k){
 let s=document.getElementById('stocks');
 s.innerHTML="";
 for(let sym of THEMES[k]){
  let d=await Y(sym);
  let m=d.chart.result[0].meta;
  let row=document.createElement('div');
  row.className='list-row';
  row.innerHTML=`${sym}<span>${m.regularMarketPrice}</span>`;
  row.onclick=()=>detail(m);
  s.appendChild(row);
 }
}

function detail(m){
 document.getElementById('sdetail').innerHTML=`
 <div class="detail-row"><span>종가</span><span>${m.regularMarketPrice}</span></div>
 <div class="detail-row"><span>고가</span><span>${m.regularMarketDayHigh}</span></div>
 <div class="detail-row"><span>저가</span><span>${m.regularMarketDayLow}</span></div>
 <div class="detail-row"><span>거래량</span><span>${m.regularMarketVolume}</span></div>
 `;
}

const ETFS=["SPY","QQQ","EEM","EFA","GDX","USO"];

function renderETF(){
 let box=document.getElementById('etf');
 let list=document.getElementById('elist');
 ETFS.forEach(e=>{
  let d=document.createElement('div');
  d.className='box';
  d.innerText=e;
  d.onclick=()=>etfDetail(e);
  box.appendChild(d);

  let row=document.createElement('div');
  row.className='list-row';
  row.innerText=e;
  row.onclick=()=>etfDetail(e);
  list.appendChild(row);
 });
}

async function etfDetail(e){
 let d=await Y(e);
 let m=d.chart.result[0].meta;
 document.getElementById('edetail').innerHTML=`
 <div class="detail-row"><span>${e}</span><span>${m.regularMarketPrice}</span></div>
 `;
}

async function news(){
 let url='https://feeds.hankyung.com/app/stock.xml';
 let r=await fetch(P+encodeURIComponent(url));
 let t=await r.text();
 let xml=new DOMParser().parseFromString(t,'text/xml');
 let items=xml.querySelectorAll('item');
 let box=document.getElementById('news');
 items.forEach((i,idx)=>{
  if(idx>5)return;
  let d=document.createElement('div');
  d.className='news-item';
  d.innerText=i.querySelector('title').textContent;
  box.appendChild(d);
 });
}

renderTheme();
stocks("반도체");
renderETF();
news();
</script>

</body>
</html>
