<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f2f4f8;
}

.header {
  text-align:center;
  padding:14px;
  font-weight:bold;
  border-bottom:2px solid #111;
}

.container { padding:10px; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.full { grid-column:1/-1; }

.title {
  font-size:12px;
  font-weight:700;
  margin-bottom:6px;
}

.value {
  font-size:18px;
  font-weight:800;
}

.up { color:#16a34a; }
.down { color:#dc2626; }

canvas {
  height:70px !important;
}

.news-item {
  font-size:13px;
  padding:6px 0;
  border-bottom:1px solid #eee;
}

.summary {
  font-size:13px;
  line-height:1.4;
}
</style>
</head>

<body>

<div class="header">Investment Daily Dashboard</div>

<div class="container">
<div class="grid">

<div class="card">
  <div class="title">📊 시장 요약</div>
  <div id="summary" class="summary">로딩중...</div>
</div>

<div class="card">
  <div class="title">💱 환율 (USD/KRW)</div>
  <div id="usd" class="value">-</div>
  <canvas id="usdChart"></canvas>
</div>

<div class="card">
  <div class="title">📈 나스닥</div>
  <div id="nasdaq" class="value">-</div>
  <canvas id="nasdaqChart"></canvas>
</div>

<div class="card">
  <div class="title">🇰🇷 코스피</div>
  <div id="kospi" class="value">-</div>
  <canvas id="kospiChart"></canvas>
</div>

<div class="card full">
  <div class="title">🔥 주요 뉴스</div>
  <div id="news">로딩중...</div>
</div>

</div>
</div>

<script>

// 안전 fetch
async function fetchData(symbol){
  try{
    const proxy = "https://api.allorigins.win/raw?url=";
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=5d&interval=1h`;

    const res = await fetch(proxy + encodeURIComponent(url));
    const json = await res.json();

    if(!json.chart || !json.chart.result) return null;

    return json.chart.result[0];

  }catch(e){
    console.log("에러:", symbol);
    return null;
  }
}

// 값 계산
function calc(meta){
  const price = meta.regularMarketPrice;
  const prev = meta.chartPreviousClose;
  const diff = price - prev;
  const pct = (diff/prev*100).toFixed(2);
  return {price, diff, pct};
}

// 렌더
function render(id,data){
  const el = document.getElementById(id);

  if(!data){
    el.innerText = "데이터 실패";
    return;
  }

  const c = calc(data.meta);

  el.innerHTML =
    c.price.toFixed(0) +
    " <span class='"+(c.diff>=0?"up":"down")+"'>("+c.pct+"%)</span>";
}

// 차트
function draw(id,data,color){
  if(!data) return;

  const arr = data.indicators.quote[0].close.filter(v=>v);

  new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:arr.map((_,i)=>i),
      datasets:[{
        data:arr,
        borderColor:color,
        tension:0.4,
        pointRadius:0
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{display:false}}
    }
  });
}

// 요약
function makeSummary(k,n,u){
  let txt="";

  if(n>1) txt+="미국 기술주 강세. ";
  if(n<-1) txt+="미국 기술주 약세. ";
  if(u>0.3) txt+="달러 강세. ";
  if(k>0.5) txt+="코스피 상승. ";
  if(k<-0.5) txt+="코스피 약세.";

  return txt || "시장 혼조.";
}

// 뉴스
async function loadNews(){
  try{
    const proxy="https://api.allorigins.win/raw?url=";
    const url="https://feeds.hankyung.com/app/stock.xml";

    const res = await fetch(proxy+url);
    const txt = await res.text();

    const xml = new DOMParser().parseFromString(txt,"text/xml");
    const items = xml.querySelectorAll("item");

    const el = document.getElementById("news");
    el.innerHTML="";

    for(let i=0;i<5;i++){
      const t = items[i]?.querySelector("title")?.textContent;
      if(!t) continue;

      const div=document.createElement("div");
      div.className="news-item";
      div.innerText="• "+t;

      el.appendChild(div);
    }

  }catch(e){
    document.getElementById("news").innerText="뉴스 실패";
  }
}

// 실행
async function init(){

  const kospi = await fetchData("^KS11");
  const nasdaq = await fetchData("^IXIC");
  const usd = await fetchData("USDKRW=X");

  render("kospi", kospi);
  render("nasdaq", nasdaq);
  render("usd", usd);

  if(kospi && nasdaq && usd){
    const k = parseFloat(calc(kospi.meta).pct);
    const n = parseFloat(calc(nasdaq.meta).pct);
    const u = parseFloat(calc(usd.meta).pct);

    document.getElementById("summary").innerText =
      makeSummary(k,n,u);
  } else {
    document.getElementById("summary").innerText = "데이터 일부 실패";
  }

  draw("kospiChart", kospi, "#1d4ed8");
  draw("nasdaqChart", nasdaq, "#7c3aed");
  draw("usdChart", usd, "#dc2626");

  loadNews();
}

init();

</script>

</body>
</html>
