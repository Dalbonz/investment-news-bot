<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard UI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:#f2f4f8;
}

.header {
  text-align:center;
  padding:16px;
  font-weight:700;
  border-bottom:2px solid #111;
}

.container { padding:12px; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card {
  background:#fff;
  border-radius:14px;
  padding:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.full { grid-column:1/-1; }

.title {
  font-size:12px;
  font-weight:700;
  margin-bottom:6px;
}

.value {
  font-size:18px;
  font-weight:800;
}

.up { color:#16a34a; }
.down { color:#dc2626; }

canvas {
  height:70px !important;
}

.news-item {
  font-size:13px;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.summary {
  font-size:13px;
  line-height:1.4;
}

.etf-scroll {
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.etf-card {
  min-width:120px;
  background:#fff;
  border-radius:10px;
  padding:8px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}

.small-chart {
  height:40px !important;
}
</style>
</head>

<body>

<div class="header">Investment Daily Dashboard</div>

<div class="container">
<div class="grid">

<!-- 요약 -->
<div class="card">
  <div class="title">📊 시장 요약</div>
  <div class="summary">
    미국 기술주 강세 → 위험자산 선호.<br>
    달러 강세 지속 → 외국인 수급 부담.
  </div>
</div>

<!-- 환율 -->
<div class="card">
  <div class="title">💱 USD/KRW</div>
  <div class="value up">1,385 (+0.45%)</div>
  <canvas id="usdChart"></canvas>
</div>

<!-- 나스닥 -->
<div class="card">
  <div class="title">📈 NASDAQ</div>
  <div class="value up">17,200 (+1.20%)</div>
  <canvas id="nasdaqChart"></canvas>
</div>

<!-- 코스피 -->
<div class="card">
  <div class="title">🇰🇷 KOSPI</div>
  <div class="value down">2,580 (-0.80%)</div>
  <canvas id="kospiChart"></canvas>
</div>

<!-- ETF -->
<div class="card full">
  <div class="title">📦 주요 ETF</div>
  <div class="etf-scroll">

    <div class="etf-card">
      SPY<br><b>520</b>
      <canvas class="small-chart" id="e1"></canvas>
    </div>

    <div class="etf-card">
      QQQ<br><b>440</b>
      <canvas class="small-chart" id="e2"></canvas>
    </div>

    <div class="etf-card">
      EEM<br><b>39</b>
      <canvas class="small-chart" id="e3"></canvas>
    </div>

  </div>
</div>

<!-- 뉴스 -->
<div class="card full">
  <div class="title">🔥 주요 뉴스</div>

  <div class="news-item">• 연준 금리 인하 기대감 확대</div>
  <div class="news-item">• 삼성전자 실적 기대치 상회</div>
  <div class="news-item">• AI 반도체 수요 지속 증가</div>
  <div class="news-item">• 유가 상승세 지속</div>

</div>

</div>
</div>

<script>

// 더미 차트 생성
function makeChart(id){
  const data = Array.from({length:20},()=>Math.random()*100);

  new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:data.map((_,i)=>i),
      datasets:[{
        data:data,
        borderWidth:2,
        tension:0.4,
        pointRadius:0
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{display:false}}
    }
  });
}

["usdChart","nasdaqChart","kospiChart","e1","e2","e3"].forEach(makeChart);

</script>

</body>
</html>
