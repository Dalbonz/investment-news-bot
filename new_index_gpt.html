<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#f4f6fa;font-family:Arial}
.wrap{padding:12px}

/* 상단 */
.top{display:grid;grid-template-columns:1.2fr 1fr;gap:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.card{
 background:#fff;
 border-radius:14px;
 padding:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.title{font-size:12px;font-weight:700;margin-bottom:6px}

/* 리스트 */
.item{
 display:flex;
 justify-content:space-between;
 font-size:12px;
 margin:2px 0;
}

.up{color:#16a34a}
.down{color:#dc2626}

canvas{height:50px!important}

/* 뉴스 */
.news-item{
 padding:8px 0;
 border-bottom:1px solid #eee;
 font-size:13px;
}

/* 섹션 */
.section{margin-top:14px}

/* 가로 카드 */
.scroll{
 display:flex;
 gap:8px;
 overflow-x:auto;
}

.theme, .etf{
 min-width:130px;
 background:#fff;
 padding:8px;
 border-radius:10px;
 cursor:pointer;
}

.small{height:30px!important}

/* 리스트 */
.list-row{
 display:flex;
 justify-content:space-between;
 padding:8px 0;
 border-bottom:1px solid #eee;
 font-size:13px;
}
</style>
</head>

<body>
<div class="wrap">

<!-- 상단 -->
<div class="top">

<div class="grid">

<!-- 주식 -->
<div class="card">
<div class="title">주식</div>

<div class="item"><span>AAPL</span><span class="up">+1.2%</span></div>
<div class="item"><span>TSLA</span><span class="down">-0.5%</span></div>

<canvas id="c1"></canvas>
</div>

<!-- 지수 -->
<div class="card">
<div class="title">지수</div>

<div class="item"><span>NASDAQ</span><span class="up">+1.1%</span></div>
<div class="item"><span>S&P500</span><span class="up">+0.8%</span></div>

<canvas id="c2"></canvas>
</div>

<!-- 외환 -->
<div class="card">
<div class="title">외환</div>

<div class="item"><span>USD/KRW</span><span class="up">+0.4%</span></div>
<div class="item"><span>EUR/USD</span><span class="down">-0.2%</span></div>

<canvas id="c3"></canvas>
</div>

<!-- 원자재 -->
<div class="card">
<div class="title">원자재</div>

<div class="item"><span>금</span><span class="up">+0.7%</span></div>
<div class="item"><span>WTI</span><span class="up">+1.2%</span></div>

<canvas id="c4"></canvas>
</div>

</div>

<!-- 뉴스 -->
<div class="card">
<div class="title">🔥 뉴스</div>
<div class="news-item">금리 인하 기대 확대</div>
<div class="news-item">AI 반도체 수요 증가</div>
<div class="news-item">삼성전자 실적 개선</div>
</div>

</div>

<!-- 주식 -->
<div class="section card">

<div class="title">📊 주식 시세</div>

<!-- 테마 -->
<div class="scroll">
<div class="theme">반도체<canvas class="small" id="t1"></canvas></div>
<div class="theme">AI<canvas class="small" id="t2"></canvas></div>
<div class="theme">방산<canvas class="small" id="t3"></canvas></div>
</div>

<!-- 종목 리스트 -->
<div class="list-row"><span>삼성전자</span><span class="up">+1.2%</span></div>
<div class="list-row"><span>SK하이닉스</span><span class="down">-0.3%</span></div>
<div class="list-row"><span>한화에어로</span><span class="up">+2.1%</span></div>

</div>

<!-- ETF -->
<div class="section card">

<div class="title">📦 ETF</div>

<!-- ETF 카드 -->
<div class="scroll">
<div class="etf">SPY<canvas class="small" id="e1"></canvas></div>
<div class="etf">QQQ<canvas class="small" id="e2"></canvas></div>
<div class="etf">EEM<canvas class="small" id="e3"></canvas></div>
</div>

<!-- ETF 리스트 -->
<div class="list-row"><span>SPY</span><span class="up">+0.8%</span></div>
<div class="list-row"><span>QQQ</span><span class="up">+1.3%</span></div>
<div class="list-row"><span>EEM</span><span class="down">-0.4%</span></div>

</div>

</div>

<script>
function chart(id){
 const d=Array.from({length:20},()=>Math.random()*100)
 const ctx=document.getElementById(id).getContext('2d')
 const g=ctx.createLinearGradient(0,0,0,50)
 g.addColorStop(0,'rgba(29,78,216,0.3)')
 g.addColorStop(1,'rgba(29,78,216,0)')
 new Chart(ctx,{
  type:'line',
  data:{labels:d.map((_,i)=>i),
  datasets:[{data:d,borderColor:'#1d4ed8',backgroundColor:g,fill:true,tension:0.4,pointRadius:0}]},
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
 })
}
["c1","c2","c3","c4","t1","t2","t3","e1","e2","e3"].forEach(chart)
</script>

</body>
</html>
