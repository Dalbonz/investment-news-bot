*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6fa;font-family:Arial,sans-serif;font-size:13px}
.wrap{padding:8px}
h2{text-align:center;font-size:14px;margin:8px 0 10px;text-decoration:underline;font-weight:700}
.top{display:grid;grid-template-columns:1.3fr 1fr;gap:8px;margin-bottom:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:#fff;border-radius:10px;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-weight:700;font-size:12px;margin-bottom:4px}
.tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:4px}
.tab{background:transparent;border:none;font-size:9px;font-weight:700;color:#888;padding:2px 5px;border-radius:4px;cursor:pointer;font-family:Arial}
.tab.on{background:#e8f0fe;color:#1d4ed8}
.chart-box{position:relative;height:55px;margin:4px 0}
.row{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:2px 0;border-bottom:1px solid #f4f4f4}
.row:last-child{border-bottom:none}
.rn{font-weight:600;color:#222}
.up{color:#16a34a}.down{color:#dc2626}.flat{color:#888}
.ntab{background:transparent;border:1px solid #e0e0e0;border-radius:12px;font-size:9px;font-weight:700;color:#888;padding:2px 8px;cursor:pointer;font-family:Arial}
.ntab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.ni{padding:5px 0;border-bottom:1px solid #f4f4f4;cursor:pointer}
.ni:last-child{border-bottom:none}
.ns{font-size:9px;color:#1d4ed8;font-weight:700;margin-bottom:1px}
.nt{font-size:11px;line-height:1.4;color:#111}
.nt:hover{color:#1d4ed8}
.sec{background:#fff;border-radius:10px;padding:8px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sec-title{font-weight:700;font-size:12px;margin-bottom:6px}
.scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.chip{background:#f0f4ff;color:#1d4ed8;border:none;border-radius:14px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Arial}
.chip.on{background:#1d4ed8;color:#fff}

/* ETF 카드 - 크기 통일 핵심 */
.etfc{
  width:120px;min-width:120px;max-width:120px;
  flex-shrink:0;
  background:#f8fafc;border:1px solid #e8edf5;border-radius:8px;padding:6px 8px;
}
.etfn{font-size:9px;font-weight:700;color:#1d4ed8;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.etfp{font-size:13px;font-weight:800;color:#111}
.etfch{font-size:10px;font-weight:600;margin-top:1px}
/* 스파크 높이 고정 */
.etfsp{width:100%;height:32px;display:block;margin-top:4px}
.etfsp canvas{width:100%!important;height:32px!important;display:block}

.tw{overflow-x:auto;margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{background:#f8fafc;color:#888;font-weight:700;padding:5px 4px;text-align:right;border-bottom:1px solid #eee;white-space:nowrap}
th:first-child{text-align:left}
td{padding:4px;text-align:right;border-bottom:1px solid #f4f4f4;white-space:nowrap;color:#222}
td:first-child{text-align:left;font-weight:700}
tr:hover td{background:#f8fafc}
.updated{text-align:center;font-size:9px;color:#bbb;padding:6px 0 14px}
</style>

function fmt(v,dec=2){if(v===null||v===undefined||isNaN(v))return'-';return Number(v).toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function cls(v){return v>0?'up':v<0?'down':'flat';}
function sign(v){return v>0?'+':'';}
function dummySpark(){return Array.from({length:20},(_,i)=>50+Math.sin(i/3)*10+Math.random()*5);}

async function yfetch(symbol,interval,range){
  const base='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval='+interval+'&range='+range;
  for(const pf of PROXY){
    try{
      const r=await fetch(pf(base),{signal:AbortSignal.timeout(4500)});
      if(!r.ok)continue;
      const j=await r.json();
      if(j?.chart?.result?.[0])return j;
    }catch(e){}
  }
  return null;
}

// ── 미니차트 ──
async function drawChart(sec){
  const{cid,color,key}=sec;
  const st=secState[key];
  const sym=SYMBOLS[key][st.idx].s;
  if(chartInst[cid]){chartInst[cid].destroy();delete chartInst[cid];}
  let closes=null,labels=null;
  const data=await yfetch(sym,st.interval,st.range);
  if(data){
    try{
      closes=data.chart.result[0].indicators.quote[0].close.map(v=>v??null);
      labels=data.chart.result[0].timestamp.map(t=>{
        const d=new Date(t*1000);
        return(st.interval==='5m'||st.interval==='1h')?d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'):(d.getMonth()+1)+'/'+d.getDate();
      });
    }catch(e){}
  }
  if(!closes){closes=dummySpark();labels=closes.map((_,i)=>i);}
  const ctx=document.getElementById(cid).getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,55);
  grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'00');
  chartInst[cid]=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data:closes,borderColor:color,backgroundColor:grad,tension:.4,pointRadius:0,borderWidth:1.8,fill:true,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
  });
}

function renderList(mid,items,liveData){
  const el=document.getElementById(mid);el.innerHTML='';
  items.forEach((item,i)=>{
    const row=document.createElement('div');row.className='row';
    let price=item.p,chg=item.c;
    if(liveData&&liveData[i]){try{const meta=liveData[i].chart.result[0].meta;price=meta.regularMarketPrice;chg=price-meta.chartPreviousClose;}catch(e){}}
    const pct=item.p?(chg/item.p*100).toFixed(2):'0.00';
    const c=cls(chg);
    row.innerHTML=`<span class="rn">${item.n}</span><span class="${c}">${fmt(price,2)} <small>${sign(chg)}${Number(pct)}%</small></span>`;
    el.appendChild(row);
  });
}

function buildTabs(sec){
  const{tid,key,cid,color,mid}=sec;
  const el=document.getElementById(tid);
  const TABS=[{l:'1일',r:'1d',i:'5m'},{l:'1주',r:'5d',i:'1h'},{l:'1달',r:'1mo',i:'1d'},{l:'3달',r:'3mo',i:'1wk'},{l:'1년',r:'1y',i:'1mo'}];
  el.innerHTML='';
  TABS.forEach((t,idx)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(idx===0?' on':'');
    btn.textContent=t.l;
    btn.onclick=()=>{
      el.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      secState[key].range=t.r;secState[key].interval=t.i;
      drawChart(sec);
    };
    el.appendChild(btn);
  });
}

  buildTabs(sec);
  const{key,mid,data}=sec;
  renderList(mid,data,null);
  const results=await Promise.all(SYMBOLS[key].map(s=>yfetch(s.s,'1d','5d')));
  renderList(mid,data,results);
  await drawChart(sec);
}

// ── 주식 테이블 (테마별) ──
async function loadStockTable(theme){
  currentTheme=theme;
  const tbody=document.getElementById('stb');
  tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#bbb;padding:8px">로딩 중...</td></tr>';

  let list=THEMES_DEF[theme]||[];

  // 실시간 상승/하락: KR50 데이터 활용
  if(theme==='실시간▲상승'||theme==='실시간▼하락'){
    if(kr50Cache.length===0){
      // 아직 캐시 없으면 더미
      const dummyDir = theme==='실시간▲상승'
        ? DUMMY.stocktable.filter(d=>d.c>0)
        : DUMMY.stocktable.filter(d=>d.c<0);
      renderStockTableDummy(dummyDir);
      return;
    }
    const sorted = [...kr50Cache].sort((a,b)=>theme==='실시간▲상승'?b.pct-a.pct:a.pct-b.pct);
    renderStockTableLive(sorted.slice(0,20));
    return;
  }

  if(theme==='한국주요50'){
    if(kr50Cache.length>0){renderStockTableLive(kr50Cache);return;}
    // 더미 먼저
    renderStockTableDummy(DUMMY.stocktable);
    // 실제 fetch (50개 병렬)
    const results=await Promise.all(KR50.map(s=>yfetch(s.s,'1d','5d')));
    kr50Cache=[];
    KR50.forEach((s,i)=>{
      try{
        const meta=results[i].chart.result[0].meta;
        const p=meta.regularMarketPrice;
        const prev=meta.chartPreviousClose;
        const c=p-prev;
        const pct=c/prev*100;
        kr50Cache.push({n:s.n,s:s.s,p,c,pct,vol:meta.regularMarketVolume||0,h:meta.regularMarketDayHigh||0,l:meta.regularMarketDayLow||0});
      }catch(e){kr50Cache.push({n:s.n,s:s.s,p:0,c:0,pct:0,vol:0,h:0,l:0});}
    });
    renderStockTableLive(kr50Cache);
    return;
  }

  // 기타 테마
  renderStockTableDummy(DUMMY.stocktable.slice(0,4));
  if(list.length===0)return;
  const results=await Promise.all(list.map(s=>yfetch(s.s,'1d','5d')));
  const rows=list.map((s,i)=>{
    try{
      const meta=results[i].chart.result[0].meta;
      const p=meta.regularMarketPrice;
      const prev=meta.chartPreviousClose;
      const c=p-prev;
      const pct=c/prev*100;
      return{n:s.n,p,c,pct,vol:meta.regularMarketVolume||0,h:meta.regularMarketDayHigh||0,l:meta.regularMarketDayLow||0};
    }catch(e){return{n:s.n,p:0,c:0,pct:0,vol:0,h:0,l:0};}
  });
  renderStockTableLive(rows);
}

function renderStockTableLive(rows){
  document.getElementById('stb').innerHTML=rows.map(d=>{
    const c=cls(d.pct);
    return`<tr>
      <td>${d.n}</td>
      <td>${d.p?d.p.toLocaleString(undefined,{maximumFractionDigits:0}):'-'}</td>
      <td class="${c}">${sign(d.c)}${d.c?d.c.toFixed(0):'-'}</td>
      <td class="${c}">${sign(d.pct)}${d.pct?d.pct.toFixed(2):'-'}%</td>
      <td>${d.vol?(d.vol/1000).toFixed(0)+'K':'-'}</td>
      <td>${d.h?d.h.toLocaleString(undefined,{maximumFractionDigits:0}):'-'}</td>
      <td>${d.l?d.l.toLocaleString(undefined,{maximumFractionDigits:0}):'-'}</td>
    </tr>`;
  }).join('');
}

function renderStockTableDummy(rows){
  document.getElementById('stb').innerHTML=rows.map(d=>{
    const c=cls(d.c||d.pct);
    return`<tr>
      <td>${d.n}</td>
      <td>${(d.p||0).toLocaleString()}</td>
      <td class="${c}">${sign(d.c||0)}${d.c||0}</td>
      <td class="${c}">${sign(d.pct||0)}${(d.pct||0).toFixed?d.pct.toFixed(2):d.pct}%</td>
      <td>${(d.vol||0).toLocaleString()}</td>
      <td>${(d.h||0).toLocaleString()}</td>
      <td>${(d.l||0).toLocaleString()}</td>
    </tr>`;
  }).join('');
}

// ── 테마 칩 ──
function buildThemes(){
  const el=document.getElementById('themes');
  el.innerHTML='';
  const keys=Object.keys(THEMES_DEF);
  keys.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='chip'+(i===0?' on':'');

    // 상승/하락 칩 색상
    if(t==='실시간▲상승') btn.style.cssText='background:#dcfce7;color:#16a34a';
    if(t==='실시간▼하락') btn.style.cssText='background:#fee2e2;color:#dc2626';

    btn.textContent=t;
    btn.onclick=()=>{
      document.querySelectorAll('.chip').forEach(b=>{
        b.classList.remove('on');
        // 색상 리셋
        if(b.textContent==='실시간▲상승') b.style.cssText='background:#dcfce7;color:#16a34a';
        else if(b.textContent==='실시간▼하락') b.style.cssText='background:#fee2e2;color:#dc2626';
        else b.style.cssText='';
      });
      btn.classList.add('on');
      if(t==='실시간▲상승') btn.style.cssText='background:#16a34a;color:#fff';
      else if(t==='실시간▼하락') btn.style.cssText='background:#dc2626;color:#fff';
      loadStockTable(t);
    };
    el.appendChild(btn);
  });
}

// ── ETF ──
async function loadETF(){
  const cardWrap=document.getElementById('etfcards');
  const tbody=document.getElementById('etftb');
  etfSparks.forEach(c=>c&&c.destroy());
  etfSparks=[];
  renderETF(DUMMY.etf,null,cardWrap,tbody);
  const results=await Promise.all(SYMBOLS.etf.map(s=>yfetch(s.s,'1d','5d')));
  renderETF(DUMMY.etf,results,cardWrap,tbody);
}

function renderETF(dummies,results,cardWrap,tbody){
  etfSparks.forEach(c=>c&&c.destroy());
  etfSparks=[];
  cardWrap.innerHTML='';tbody.innerHTML='';
  dummies.forEach((d,i)=>{
    let price=d.p,chg=d.c,spark=dummySpark();
    if(results&&results[i]){
      try{
        const meta=results[i].chart.result[0].meta;
        price=meta.regularMarketPrice;chg=price-meta.chartPreviousClose;
        spark=(results[i].chart.result[0].indicators.quote[0].close||[]).filter(v=>v!=null);
        if(spark.length<2)spark=dummySpark();
      }catch(e){}
    }
    const pct=(chg/price*100).toFixed(2);
    const c=cls(chg);
    // 카드
    const card=document.createElement('div');
    card.className='etfc';
    card.innerHTML=`
      <div class="etfn">${d.n}</div>
      <div class="etfp">${fmt(price,2)}</div>
      <div class="etfch ${c}">${sign(chg)}${fmt(chg,2)} ${sign(+pct)}${pct}%</div>
      <div class="etfsp"><canvas id="es${i}"></canvas></div>`;
    cardWrap.appendChild(card);
    // 테이블
    const vol=results&&results[i]?((results[i].chart.result[0].meta.regularMarketVolume||0)/1000).toFixed(0)+'K':'-';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${d.n}</td><td>${fmt(price,2)}</td><td class="${c}">${sign(chg)}${fmt(chg,2)}</td><td class="${c}">${sign(+pct)}${pct}%</td><td>${vol}</td>`;
    tbody.appendChild(tr);
    // 스파크 - 고정 크기로
    setTimeout(()=>{
      const cv=document.getElementById('es'+i);
      if(!cv)return;
      const isUp=spark[spark.length-1]>=spark[0];
      etfSparks[i]=new Chart(cv,{
        type:'line',
        data:{labels:spark.map((_,j)=>j),datasets:[{data:spark,borderColor:isUp?'#16a34a':'#dc2626',borderWidth:1.5,pointRadius:0,tension:.4,fill:false}]},
        options:{
          responsive:false,   // ← false로 고정
          animation:false,
          plugins:{legend:{display:false},tooltip:{enabled:false}},
          scales:{x:{display:false},y:{display:false}}
        }
      });
      // canvas 크기 명시적 고정
      cv.width=104;cv.height=32;
      etfSparks[i].resize(104,32);
    },80);
  });
}

// ── 뉴스 ──
async function loadNews(){
  allNews=[...DUMMY.news];renderNews('all');
  const fetches=NEWS_SRC.map(src=>(async()=>{
    for(const pf of PROXY){
      try{
        const r=await fetch(pf(src.url),{signal:AbortSignal.timeout(4000)});
        if(!r.ok)continue;
        return{name:src.name,text:await r.text()};
      }catch(e){}
    }
    return null;
  })());
  const results=await Promise.all(fetches);
  const live=[];
  results.forEach(res=>{
    if(!res)return;
    try{
      const xml=new DOMParser().parseFromString(res.text,'text/xml');
      let cnt=0;
      for(const item of xml.querySelectorAll('item')){
        if(cnt>=5)break;
        const title=item.querySelector('title')?.textContent?.trim()||'';
        const url=item.querySelector('link')?.textContent?.trim()||'#';
        if(!title||EKW.some(k=>title.includes(k))||!IKW.some(k=>title.includes(k)))continue;
        live.push({src:res.name,title,url});cnt++;
      }
    }catch(e){}
  });
  if(live.length>0){allNews=live;renderNews('all');}
}

function renderNews(tab){
  const el=document.getElementById('news');
  const items=tab==='hot'?allNews.slice(0,3):allNews;
  el.innerHTML='';
  items.forEach(item=>{
    const div=document.createElement('div');div.className='ni';
    div.innerHTML=`<div class="ns">📌 ${item.src}</div><div class="nt" onclick="window.open('${item.url||'#'}','_blank')">${item.title}</div>`;
    el.appendChild(div);
  });
}

function filterNews(tab,btn){
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderNews(tab);
}

// ── 초기화 ──
async function init(){
  buildThemes();
  await Promise.all([
    ...SECTIONS.map(sec=>loadSection(sec)),
    loadNews(),
    loadStockTable('한국주요50'),
    loadETF(),
  ]);
  document.getElementById('upd').textContent='마지막 업데이트: '+new Date().toLocaleString('ko-KR');
}

init();
setInterval(init,300000);
</script>
