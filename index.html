<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Daily Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f8;
  --card: #ffffff;
  --border: #e4e8f0;
  --text: #0f1923;
  --sub: #6b7280;
  --up: #16a34a;
  --down: #dc2626;
  --accent: #1d4ed8;
  --accent2: #7c3aed;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 18px 16px 10px;
  border-bottom: 2px solid var(--text);
  margin-bottom: 14px;
}
.header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.35em;
  letter-spacing: 0.02em;
  text-decoration: underline;
  text-underline-offset: 4px;
}

/* ── LAYOUT ── */
.main-wrap { padding: 0 12px 20px; }

/* 상단: 2x2 그리드 + 뉴스 */
.top-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 10px;
  margin-bottom: 10px;
}
.news-panel {
  grid-column: 1 / -1; /* 모바일: 전체 너비 */
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
}
.card-title {
  font-size: 0.82em;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

/* ── RANGE TABS ── */
.range-tabs {
  display: flex; gap: 2px; margin-bottom: 6px; flex-wrap: wrap;
}
.range-tab {
  background: transparent; color: var(--sub);
  border: none; border-radius: 5px;
  padding: 2px 6px; font-size: 0.6em; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.range-tab.active { background: rgba(29,78,216,0.1); color: var(--accent); }

/* ── MINI CHART ── */
.mini-chart-wrap { height: 70px; margin-bottom: 6px; }

/* ── ITEM LIST ── */
.item-list { display: flex; flex-direction: column; gap: 0; }
.item-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.7em;
}
.item-row:last-child { border-bottom: none; }
.item-name { font-weight: 600; color: var(--text); font-size: 0.95em; }
.item-price { font-weight: 700; text-align: right; }
.item-chg { font-weight: 500; text-align: right; min-width: 42px; }
.item-pct { font-weight: 500; text-align: right; min-width: 42px; }
.up { color: var(--up); }
.down { color: var(--down); }
.flat { color: var(--sub); }

/* ── NEWS PANEL ── */
.news-tabs {
  display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap;
}
.news-tab {
  background: transparent; color: var(--sub);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 3px 10px; font-size: 0.65em; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.news-tab.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.news-section-title {
  font-size: 0.78em; font-weight: 700; margin-bottom: 8px;
  display: flex; align-items: center; gap: 4px;
}
.news-item {
  display: flex; flex-direction: column; gap: 3px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.news-item:last-child { border-bottom: none; }
.news-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.58em; font-weight: 700;
  background: #fef3c7; color: #92400e;
  border-radius: 4px; padding: 1px 5px;
  width: fit-content;
}
.news-title {
  font-size: 0.78em; font-weight: 600; line-height: 1.45;
  color: var(--text); cursor: pointer;
}
.news-title:hover { color: var(--accent); }
.news-meta { font-size: 0.6em; color: var(--sub); display: flex; gap: 8px; align-items: center; }
.save-btn {
  font-size: 0.6em; background: var(--accent); color: #fff;
  border: none; border-radius: 4px; padding: 2px 7px;
  cursor: pointer; font-family: inherit; font-weight: 600;
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 0.82em; font-weight: 700; color: var(--text);
  margin: 14px 0 8px;
  display: flex; align-items: center; gap: 6px;
}
.section-label span { color: var(--sub); font-weight: 400; font-size: 0.9em; }

/* ── ETF CARDS ── */
.etf-scroll {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 6px; margin-bottom: 10px;
  scrollbar-width: none;
}
.etf-scroll::-webkit-scrollbar { display: none; }
.etf-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 12px;
  min-width: 130px; flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.etf-name { font-size: 0.65em; font-weight: 700; color: var(--accent); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.etf-price { font-size: 1em; font-weight: 800; color: var(--text); }
.etf-chg { font-size: 0.68em; font-weight: 600; margin-top: 1px; }
.etf-spark { height: 36px; margin-top: 6px; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; margin-bottom: 14px; }
table {
  width: 100%; border-collapse: collapse;
  font-size: 0.65em;
}
th {
  background: #f8fafc; color: var(--sub);
  font-weight: 600; padding: 6px 6px;
  text-align: right; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th:first-child { text-align: left; }
td {
  padding: 5px 6px; text-align: right;
  border-bottom: 1px solid var(--border);
  font-weight: 500; white-space: nowrap;
}
td:first-child { text-align: left; font-weight: 600; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }

.loading-msg { text-align: center; color: var(--sub); font-size: 0.8em; padding: 12px; }
.updated { text-align: center; font-size: 0.6em; color: var(--sub); padding: 6px 0 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>Investment Daily Dashboard</h1>
</div>

<div class="main-wrap">

  <!-- 상단 2x2 + 뉴스 -->
  <div class="top-layout">

    <!-- 주식 -->
    <div class="card" id="stock-card">
      <div class="card-title">주식</div>
      <div class="range-tabs" id="stock-range-tabs">
        <button class="range-tab active" onclick="switchRange('stock','1d','5m',this)">1일</button>
        <button class="range-tab" onclick="switchRange('stock','5d','1h',this)">1주</button>
        <button class="range-tab" onclick="switchRange('stock','1mo','1d',this)">1달</button>
        <button class="range-tab" onclick="switchRange('stock','3mo','1wk',this)">3달</button>
        <button class="range-tab" onclick="switchRange('stock','1y','1mo',this)">1년</button>
      </div>
      <div class="mini-chart-wrap"><canvas id="stockChart"></canvas></div>
      <div class="item-list" id="stock-list"><div class="loading-msg">로딩 중...</div></div>
    </div>

    <!-- 지수 -->
    <div class="card" id="index-card">
      <div class="card-title">지수</div>
      <div class="range-tabs" id="index-range-tabs">
        <button class="range-tab active" onclick="switchRange('index','1d','5m',this)">1일</button>
        <button class="range-tab" onclick="switchRange('index','5d','1h',this)">1주</button>
        <button class="range-tab" onclick="switchRange('index','1mo','1d',this)">1달</button>
        <button class="range-tab" onclick="switchRange('index','3mo','1wk',this)">3달</button>
        <button class="range-tab" onclick="switchRange('index','1y','1mo',this)">1년</button>
      </div>
      <div class="mini-chart-wrap"><canvas id="indexChart"></canvas></div>
      <div class="item-list" id="index-list"><div class="loading-msg">로딩 중...</div></div>
    </div>

    <!-- 외환 -->
    <div class="card" id="fx-card">
      <div class="card-title">외환</div>
      <div class="range-tabs" id="fx-range-tabs">
        <button class="range-tab active" onclick="switchRange('fx','1d','5m',this)">1일</button>
        <button class="range-tab" onclick="switchRange('fx','5d','1h',this)">1주</button>
        <button class="range-tab" onclick="switchRange('fx','1mo','1d',this)">1달</button>
        <button class="range-tab" onclick="switchRange('fx','3mo','1wk',this)">3달</button>
        <button class="range-tab" onclick="switchRange('fx','1y','1mo',this)">1년</button>
      </div>
      <div class="mini-chart-wrap"><canvas id="fxChart"></canvas></div>
      <div class="item-list" id="fx-list"><div class="loading-msg">로딩 중...</div></div>
    </div>

    <!-- 원자재 -->
    <div class="card" id="commodity-card">
      <div class="card-title">원자재</div>
      <div class="range-tabs" id="commodity-range-tabs">
        <button class="range-tab active" onclick="switchRange('commodity','1d','5m',this)">1일</button>
        <button class="range-tab" onclick="switchRange('commodity','5d','1h',this)">1주</button>
        <button class="range-tab" onclick="switchRange('commodity','1mo','1d',this)">1달</button>
        <button class="range-tab" onclick="switchRange('commodity','3mo','1wk',this)">3달</button>
        <button class="range-tab" onclick="switchRange('commodity','1y','1mo',this)">1년</button>
      </div>
      <div class="mini-chart-wrap"><canvas id="commodityChart"></canvas></div>
      <div class="item-list" id="commodity-list"><div class="loading-msg">로딩 중...</div></div>
    </div>

    <!-- 뉴스 -->
    <div class="card news-panel">
      <div class="news-tabs">
        <button class="news-tab active" onclick="switchNewsTab('all',this)">전체</button>
        <button class="news-tab" onclick="switchNewsTab('hot',this)">🔥뉴스</button>
        <button class="news-tab" onclick="switchNewsTab('reuters',this)">로이터</button>
        <button class="news-tab" onclick="switchNewsTab('finance',this)">파이낸셜주주</button>
        <button class="news-tab" onclick="switchNewsTab('sentiment',this)">감성뉴스</button>
      </div>
      <div class="news-section-title">🔥 오늘 주요뉴스 &gt;</div>
      <div id="news-list"><div class="loading-msg">뉴스 로딩 중...</div></div>
    </div>

  </div>

  <!-- 주식 시세 테이블 -->
  <div class="section-label">주식 시세 <span>: 주요 내용 및 분석 요약 (2~3줄)</span></div>
  <div class="table-wrap">
    <table id="stock-table">
      <thead>
        <tr>
          <th>종목</th><th>현재가</th><th>전일비</th><th>등락률</th>
          <th>거래량</th><th>시가</th><th>고가</th><th>저가</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="8" class="loading-msg">로딩 중...</td></tr></tbody>
    </table>
  </div>

  <!-- 주요 ETF -->
  <div class="section-label">주요 ETF <span>: 주요 내용 및 분석 요약 (2~3줄)</span></div>
  <div class="etf-scroll" id="etf-cards"><div class="loading-msg">로딩 중...</div></div>

  <!-- ETF 상세 테이블 -->
  <div class="table-wrap">
    <table id="etf-table">
      <thead>
        <tr>
          <th>종목</th><th>현재가</th><th>전일비</th><th>등락률</th>
          <th>시가총액</th><th>YTD</th><th>1년</th><th>3년</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="8" class="loading-msg">로딩 중...</td></tr></tbody>
    </table>
  </div>

  <div class="updated" id="updated-time"></div>
</div>

<script>
const PROXY = 'https://api.allorigins.win/raw?url=';

// ── 데이터 정의 ──
const STOCKS_DATA = [
  { name: 'AAPL', symbol: 'AAPL' },
  { name: 'BABA', symbol: 'BABA' },
  { name: 'TSLA', symbol: 'TSLA' },
  { name: 'MSFT', symbol: 'MSFT' },
  { name: 'BAC',  symbol: 'BAC'  },
  { name: 'KO',   symbol: 'KO'   },
  { name: 'XOM',  symbol: 'XOM'  },
];
const INDEX_DATA = [
  { name: '코스피',     symbol: '^KS11'  },
  { name: '코스닥',     symbol: '^KQ11'  },
  { name: 'US S00',    symbol: '^GSPC'  },
  { name: '나스닥',     symbol: '^IXIC'  },
  { name: 'US Tech100', symbol: '^NDX'  },
  { name: 'DAX',       symbol: '^GDAXI' },
  { name: '니케이',     symbol: '^N225'  },
];
const FX_DATA = [
  { name: '달러/원',     symbol: 'USDKRW=X' },
  { name: '유로/달러',   symbol: 'EURUSD=X' },
  { name: '엔/달러',     symbol: 'USDJPY=X' },
  { name: '위안/달러',   symbol: 'USDCNY=X' },
  { name: '파운드/달러', symbol: 'GBPUSD=X' },
  { name: '유로/원',     symbol: 'EURKRW=X' },
  { name: '달러인덱스',  symbol: 'DX-Y.NYB' },
];
const COMMODITY_DATA = [
  { name: '금',      symbol: 'GC=F'  },
  { name: '은',      symbol: 'SI=F'  },
  { name: '구리',    symbol: 'HG=F'  },
  { name: '팔라듐',  symbol: 'PA=F'  },
  { name: '백금',    symbol: 'PL=F'  },
  { name: 'WTI',     symbol: 'CL=F'  },
  { name: '천연가스', symbol: 'NG=F'  },
];
const ETF_DATA = [
  { name: 'SPDR S&P 500',    symbol: 'SPY'  },
  { name: '인베스코QQQ',      symbol: 'QQQ'  },
  { name: 'iShares MSCI EM', symbol: 'EEM'  },
  { name: 'iShares MSCI EAFE',symbol:'EFA'  },
  { name: 'VanEck Gold Min.', symbol: 'GDX'  },
  { name: 'United States Oil',symbol: 'USO'  },
];
const STOCK_TABLE_DATA = [
  { name: '삼성전자',   symbol: '005930.KS' },
  { name: 'SK하이닉스', symbol: '000660.KS' },
  { name: '한화에어로', symbol: '012450.KS' },
  { name: '현대차',     symbol: '005380.KS' },
  { name: 'LG에너지',   symbol: '373220.KS' },
  { name: '카카오',     symbol: '035720.KS' },
  { name: 'NAVER',      symbol: '035420.KS' },
  { name: '셀트리온',   symbol: '068270.KS' },
];
const NEWS_SOURCES = [
  { name: '한국경제', url: 'https://feeds.hankyung.com/app/stock.xml' },
  { name: '매일경제', url: 'https://www.mk.co.kr/rss/30100041/' },
  { name: '머니투데이', url: 'https://news.mt.co.kr/mtview/rss/stock.xml' },
];
const INVEST_KW = ['주식','증시','코스피','코스닥','나스닥','S&P','금리','환율','달러','유가','원자재','채권','ETF','펀드','투자','매수','매도','실적','수출','무역','경제','GDP','인플레','연준','Fed','반도체','배당','IPO','공모','상장','삼성','하이닉스'];
const EXCLUDE_KW = ['연예','드라마','영화','아이돌','가수','배우','스포츠','축구','야구','골프','패션','뷰티','맛집','여행','결혼','이혼'];

// ── 차트 인스턴스 ──
const charts = { stock: null, index: null, fx: null, commodity: null };
const ranges = {
  stock:     { range: '1d', interval: '5m', symbol: 'AAPL' },
  index:     { range: '1d', interval: '5m', symbol: '^KS11' },
  fx:        { range: '1d', interval: '5m', symbol: 'USDKRW=X' },
  commodity: { range: '1d', interval: '5m', symbol: 'GC=F' },
};
const colors = { stock: '#1d4ed8', index: '#7c3aed', fx: '#dc2626', commodity: '#d97706' };

function isInvestNews(t) {
  if (EXCLUDE_KW.some(k => t.includes(k))) return false;
  return INVEST_KW.some(k => t.includes(k));
}

async function yFetch(symbol, interval, range) {
  const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol) + '?interval=' + interval + '&range=' + range;
  const r = await fetch(PROXY + encodeURIComponent(url));
  return r.json();
}

// ── 미니 차트 ──
async function loadMiniChart(section) {
  const { range, interval, symbol } = ranges[section];
  const canvasId = section + 'Chart';
  if (charts[section]) { charts[section].destroy(); charts[section] = null; }
  try {
    const data = await yFetch(symbol, interval, range);
    const closes = data.chart.result[0].indicators.quote[0].close.map(v => v ? +v.toFixed(4) : null);
    const labels = data.chart.result[0].timestamp.map(t => {
      const d = new Date(t * 1000);
      if (interval === '5m' || interval === '1h') return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
      return (d.getMonth()+1) + '/' + d.getDate();
    });
    const color = colors[section];
    const ctx = document.getElementById(canvasId).getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 70);
    grad.addColorStop(0, color + '30'); grad.addColorStop(1, color + '00');
    charts[section] = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ data: closes, borderColor: color, backgroundColor: grad, tension: 0.4, pointRadius: 0, borderWidth: 1.8, fill: true }] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: true, ticks: { color: '#9ca3af', font: { size: 8 }, maxTicksLimit: 5 }, grid: { color: '#f1f5f9' } },
          y: { display: true, position: 'right', ticks: { color: '#9ca3af', font: { size: 8 }, maxTicksLimit: 4 }, grid: { color: '#f1f5f9' } }
        }
      }
    });
  } catch(e) {}
}

function switchRange(section, range, interval, btn) {
  ranges[section].range = range;
  ranges[section].interval = interval;
  document.querySelectorAll('#' + section + '-range-tabs .range-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadMiniChart(section);
}

// ── 리스트 렌더 ──
function renderList(listId, items, results) {
  const el = document.getElementById(listId);
  el.innerHTML = '';
  results.forEach((data, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    try {
      const meta = data.chart.result[0].meta;
      const price = meta.regularMarketPrice;
      const prev = meta.chartPreviousClose;
      const chg = price - prev;
      const pct = (chg / prev * 100).toFixed(2);
      const cls = chg >= 0 ? 'up' : 'down';
      const sign = chg >= 0 ? '+' : '';
      row.innerHTML =
        '<span class="item-name">' + items[i].name + '</span>' +
        '<span class="item-price">' + price.toLocaleString(undefined,{maximumFractionDigits:2}) + '</span>' +
        '<span class="item-chg ' + cls + '">' + sign + chg.toFixed(2) + '</span>' +
        '<span class="item-pct ' + cls + '">' + sign + pct + '%</span>';
    } catch(e) {
      row.innerHTML = '<span class="item-name">' + items[i].name + '</span><span class="item-price" style="color:#9ca3af">-</span><span>-</span><span>-</span>';
    }
    el.appendChild(row);
  });
}

async function fetchSection(section, items, listId) {
  const results = await Promise.all(items.map(s => yFetch(s.symbol, '1d', '5d').catch(() => null)));
  renderList(listId, items, results);
  // 첫 번째 심볼로 차트
  ranges[section].symbol = items[0].symbol;
  loadMiniChart(section);
}

// ── 주식 테이블 ──
async function fetchStockTable() {
  const tbody = document.querySelector('#stock-table tbody');
  const results = await Promise.all(STOCK_TABLE_DATA.map(s => yFetch(s.symbol, '1d', '5d').catch(() => null)));
  tbody.innerHTML = '';
  results.forEach((data, i) => {
    const tr = document.createElement('tr');
    try {
      const meta = data.chart.result[0].meta;
      const price = meta.regularMarketPrice;
      const prev  = meta.chartPreviousClose;
      const chg   = price - prev;
      const pct   = (chg / prev * 100).toFixed(2);
      const cls   = chg >= 0 ? 'up' : 'down';
      const sign  = chg >= 0 ? '+' : '';
      const vol   = (meta.regularMarketVolume || 0).toLocaleString();
      const open  = (meta.regularMarketOpen || 0).toLocaleString();
      const high  = (meta.regularMarketDayHigh || 0).toLocaleString();
      const low   = (meta.regularMarketDayLow  || 0).toLocaleString();
      tr.innerHTML =
        '<td>' + STOCK_TABLE_DATA[i].name + '</td>' +
        '<td>' + price.toLocaleString(undefined,{maximumFractionDigits:0}) + '</td>' +
        '<td class="' + cls + '">' + sign + chg.toFixed(0) + '</td>' +
        '<td class="' + cls + '">' + sign + pct + '%</td>' +
        '<td>' + vol + '</td>' +
        '<td>' + open + '</td>' +
        '<td>' + high + '</td>' +
        '<td>' + low  + '</td>';
    } catch(e) {
      tr.innerHTML = '<td>' + STOCK_TABLE_DATA[i].name + '</td>' + '<td colspan="7" style="color:#9ca3af">-</td>';
    }
    tbody.appendChild(tr);
  });
}

// ── ETF 카드 + 테이블 ──
let etfSparkCharts = [];
async function fetchETF() {
  const container = document.getElementById('etf-cards');
  const tbody = document.querySelector('#etf-table tbody');
  const results = await Promise.all(ETF_DATA.map(s => yFetch(s.symbol, '1d', '5d').catch(() => null)));
  etfSparkCharts.forEach(c => c && c.destroy());
  etfSparkCharts = [];
  container.innerHTML = '';
  tbody.innerHTML = '';

  results.forEach((data, i) => {
    const s = ETF_DATA[i];
    // 카드
    const card = document.createElement('div');
    card.className = 'etf-card';
    let priceHtml = '<div class="etf-price">-</div><div class="etf-chg" style="color:#9ca3af">-</div>';
    let sparkData = [];
    try {
      const meta = data.chart.result[0].meta;
      const price = meta.regularMarketPrice;
      const prev  = meta.chartPreviousClose;
      const chg   = price - prev;
      const pct   = (chg / prev * 100).toFixed(2);
      const cls   = chg >= 0 ? 'up' : 'down';
      const sign  = chg >= 0 ? '+' : '';
      priceHtml =
        '<div class="etf-price">' + price.toFixed(2) + '</div>' +
        '<div class="etf-chg ' + cls + '">' + sign + chg.toFixed(2) + ' ' + sign + pct + '%</div>';
      sparkData = (data.chart.result[0].indicators.quote[0].close || []).filter(v => v != null);

      // 테이블 행
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + s.name + '</td>' +
        '<td>' + price.toFixed(2) + '</td>' +
        '<td class="' + cls + '">' + sign + chg.toFixed(2) + '</td>' +
        '<td class="' + cls + '">' + sign + pct + '%</td>' +
        '<td>-</td><td>-</td><td>-</td><td>-</td>';
      tbody.appendChild(tr);
    } catch(e) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + s.name + '</td><td colspan="7" style="color:#9ca3af">-</td>';
      tbody.appendChild(tr);
    }

    card.innerHTML = '<div class="etf-name">' + s.name + '</div>' + priceHtml + '<div class="etf-spark"><canvas id="etf-spark-' + i + '"></canvas></div>';
    container.appendChild(card);

    if (sparkData.length > 1) {
      setTimeout(() => {
        const ctx = document.getElementById('etf-spark-' + i);
        if (!ctx) return;
        const isUp = sparkData[sparkData.length-1] >= sparkData[0];
        etfSparkCharts[i] = new Chart(ctx, {
          type: 'line',
          data: { labels: sparkData.map((_,j)=>j), datasets: [{ data: sparkData, borderColor: isUp ? '#16a34a' : '#dc2626', borderWidth: 1.2, pointRadius: 0, tension: 0.4, fill: false }] },
          options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
      }, 60);
    }
  });
}

// ── 뉴스 ──
let allNewsItems = [];
async function fetchNews() {
  const el = document.getElementById('news-list');
  allNewsItems = [];
  const fetches = NEWS_SOURCES.map(src =>
    fetch(PROXY + encodeURIComponent(src.url)).then(r => r.text()).then(text => ({ src, text })).catch(() => null)
  );
  const results = await Promise.all(fetches);
  for (const res of results) {
    if (!res) continue;
    try {
      const xml = new DOMParser().parseFromString(res.text, 'text/xml');
      const items = xml.querySelectorAll('item');
      let cnt = 0;
      for (const item of items) {
        if (cnt >= 4) break;
        const title = item.querySelector('title')?.textContent?.trim() || '';
        const link  = item.querySelector('link')?.textContent?.trim() || '#';
        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
        if (!title || !isInvestNews(title)) continue;
        allNewsItems.push({ title, link, pubDate, src: res.src.name });
        cnt++;
      }
    } catch(e) {}
  }
  renderNews('all');
}

function renderNews(tab) {
  const el = document.getElementById('news-list');
  el.innerHTML = '';
  const items = tab === 'hot' ? allNewsItems.slice(0, 3) : allNewsItems;
  if (!items.length) {
    el.innerHTML = '<div class="loading-msg" style="color:#dc2626">뉴스를 불러오지 못했어요 😢</div>';
    return;
  }
  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'news-item';
    div.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div class="news-badge">SAVE ' + item.src + '</div>' +
        '<button class="save-btn">저장</button>' +
      '</div>' +
      '<div class="news-title" onclick="window.open(\'' + item.link + '\',\'_blank\')">' + item.title + '</div>' +
      '<div class="news-meta"><span>' + (item.pubDate ? new Date(item.pubDate).toLocaleDateString('ko-KR') : '') + '</span></div>';
    el.appendChild(div);
  });
}

function switchNewsTab(tab, btn) {
  document.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderNews(tab);
}

// ── 초기화 ──
async function init() {
  await Promise.all([
    fetchSection('stock',     STOCKS_DATA,    'stock-list'),
    fetchSection('index',     INDEX_DATA,     'index-list'),
    fetchSection('fx',        FX_DATA,        'fx-list'),
    fetchSection('commodity', COMMODITY_DATA, 'commodity-list'),
    fetchNews(),
    fetchStockTable(),
    fetchETF(),
  ]);
  document.getElementById('updated-time').textContent = '마지막 업데이트: ' + new Date().toLocaleString('ko-KR');
}

init();
setInterval(init, 300000);
