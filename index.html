<!DOCTYPE html>
<html lang="ko">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6fa;font-family:'Malgun Gothic',Arial,sans-serif;font-size:13px}
.wrap{padding:8px;max-width:1400px;margin:0 auto}
.header{text-align:center;padding:12px 0 8px}
.header h2{font-size:28px;font-weight:800;text-decoration:underline;text-underline-offset:4px}
.header .date{font-size:12px;color:#888;margin-top:3px}
.ai-box{background:#f0f7ff;border-left:4px solid #1d4ed8;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.7;color:#1e3a5f}
.ai-label{font-size:14px;font-weight:700;color:#1d4ed8;margin-bottom:4px}
.top{display:grid;gap:8px;margin-bottom:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:768px){.top{grid-template-columns:1.3fr 1fr}}
@media(max-width:767px){.top{grid-template-columns:1fr}.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.grid4{grid-template-columns:1fr}.header h2{font-size:20px}}
.card{background:#fff;border-radius:10px;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);min-width:0}
.card-title{font-weight:700;font-size:15px;margin-bottom:6px;color:#1d1d1f}
.card-tabs{display:flex;gap:4px;margin-bottom:6px}
.card-tab{background:transparent;border:1px solid #e0e0e0;border-radius:10px;font-size:10px;font-weight:700;color:#888;padding:2px 8px;cursor:pointer;font-family:inherit}
.card-tab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.chart-box{height:80px;margin:4px 0;position:relative;overflow:hidden}
.row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0;border-bottom:1px solid #f4f4f4}
.row:last-child{border-bottom:none}
.rn{font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.up{color:#c84a31}.down{color:#1261c4}.flat{color:#888}
.ntab{background:transparent;border:1px solid #e0e0e0;border-radius:12px;font-size:10px;font-weight:700;color:#888;padding:3px 10px;cursor:pointer;font-family:inherit}
.ntab.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.ni{padding:7px 0;border-bottom:1px solid #f4f4f4}
.ni:last-child{border-bottom:none}
.ni-top{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.ns{font-size:10px;color:#1d4ed8;font-weight:700}
.nbadge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px;color:#fff}
.nbadge.속보{background:#e53e3e}
.nbadge.분석{background:#2b6cb0}
.nbadge.국내{background:#276749}
.nt{font-size:12px;line-height:1.4;color:#111;cursor:pointer}
.nt:hover{color:#1d4ed8}
.sec{background:#fff;border-radius:10px;padding:10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sec-title{font-weight:700;font-size:15px;margin-bottom:8px;color:#1d1d1f}
.scroll-x{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}
.chip{background:#f0f4ff;color:#1d4ed8;border:none;border-radius:14px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.on{background:#1d4ed8;color:#fff}
.etf-grid{display:grid;gap:6px;margin-bottom:8px}
.etfc{background:#f8fafc;border:1px solid #e8edf5;border-radius:8px;padding:8px;min-width:0}
.etfn{font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.etfp{font-size:14px;font-weight:800;color:#111}
.etfch{font-size:11px;font-weight:600;margin-top:1px}
.etf-spark{height:40px;margin-top:4px}
.tw{overflow-x:auto;margin-top:6px}
.stock-scroll{max-height:300px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f8fafc;color:#888;font-weight:700;padding:6px 4px;text-align:right;border-bottom:1px solid #eee;white-space:nowrap;position:sticky;top:0;z-index:1}
th:first-child{text-align:left}
td{padding:5px 4px;text-align:right;border-bottom:1px solid #f4f4f4;white-space:nowrap;color:#222}
td:first-child{text-align:left;font-weight:700;cursor:pointer;color:#1d4ed8}
td:first-child:hover{text-decoration:underline}
tr:hover td{background:#f8fafc}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99}
.overlay.show{display:block}
.detail-panel{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:66%;min-width:320px;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);padding:16px;z-index:100;max-height:80vh;overflow-y:auto}
.detail-panel.show{display:block}
@media(max-width:767px){.detail-panel{width:100%}}
.detail-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}
.detail-name{font-size:18px;font-weight:800;margin-bottom:2px}
.detail-price{font-size:26px;font-weight:800;margin:6px 0}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.detail-item{background:#f8fafc;border-radius:8px;padding:8px;text-align:center}
.detail-item .dl{font-size:10px;color:#888;margin-bottom:3px}
.detail-item .dv{font-size:12px;font-weight:700}
.detail-chart-wrap{height:220px;margin:8px 0}
.detail-tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.detail-tab{background:transparent;border:1px solid #e0e0e0;border-radius:8px;font-size:10px;font-weight:700;color:#888;padding:4px 10px;cursor:pointer;font-family:inherit}

  {n:'SPDR S&P500',s:'SPY'},{n:'인베스코QQQ',s:'QQQ'},{n:'iShares EM',s:'EEM'},

];
const NAVER={up:'#c84a31',down:'#1261c4',upBg:'rgba(200,74,49,0.07)',downBg:'rgba(18,97,196,0.07)',grid:'#f0f0f0',text:'#888',border:'#e0e0e0'};

let jsonData=null,allNews=[],kr50Cache=[],detailChartInst=null,currentDetailSymbol='';
const miniCharts={};

function cls(v){return v>0?'up':v<0?'down':'flat';}
function sign(v){return v>0?'+':'';}
function fmt(v,d=2){if(v===null||v===undefined||isNaN(v))return'-';return Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});}
function getEtfCols(){const w=window.innerWidth;if(w>=1024)return 6;if(w>=768)return 4;if(w>=480)return 3;return 2;}

async function loadJSON(){
  try{const r=await fetch('./data.json?t='+Date.now());jsonData=await r.json();}
  catch(e){console.log('data.json 로드 실패:',e);}
}

async function yfetch(symbol,interval,range){
  const base='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval='+interval+'&range='+range;
  for(const pf of PROXY){
    try{
      const r=await fetch(pf(base),{signal:AbortSignal.timeout(6000)});
      if(!r.ok)continue;
      const j=await r.json();
      if(j?.chart?.result?.[0])return j;
    }catch(e){}
  }
  return null;
}

// 미니차트: 축은 최소한만 보이게, 선 얇게
function makeMiniChart(containerId,candles,isUp){
  const el=document.getElementById(containerId);
  if(!el||!candles||candles.length<2)return;
  if(miniCharts[containerId]){try{miniCharts[containerId].remove();}catch(e){}}
  el.innerHTML='';
  const w=el.clientWidth||200;
  const color=isUp?NAVER.up:NAVER.down;
  const bgColor=isUp?NAVER.upBg:NAVER.downBg;
  const chart=LightweightCharts.createChart(el,{
    width:w,height:80,
    layout:{background:{color:'transparent'},textColor:NAVER.text,fontSize:9},
    grid:{vertLines:{color:'transparent'},horzLines:{color:'rgba(200,200,200,0.3)'}},
    rightPriceScale:{
      borderVisible:false,
      visible:true,
      scaleMargins:{top:0.1,bottom:0.05},
      drawTicks:false,
    },
    timeScale:{
      borderVisible:false,
      visible:true,
      timeVisible:false,
      fixLeftEdge:true,
      fixRightEdge:true,
    },
    crosshair:{mode:LightweightCharts.CrosshairMode.Hidden},
    handleScroll:false,handleScale:false,
  });
  const series=chart.addAreaSeries({
    lineColor:color,
    topColor:bgColor,
    bottomColor:'transparent',
    lineWidth:1,
    priceLineVisible:false,
    lastValueVisible:false,
    crosshairMarkerVisible:false,
  });
  const sorted=candles.map(c=>({time:c.time,value:c.close})).sort((a,b)=>a.time-b.time);
  series.setData(sorted);
  chart.timeScale().fitContent();
  miniCharts[containerId]=chart;
  new ResizeObserver(()=>{
    const nw=el.clientWidth;
    if(nw>0)chart.resize(nw,80);
  }).observe(el);
}

function switchStockTab(tab,btn){
  document.querySelectorAll('.card-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderStockCard(tab==='kr'?STOCK_KR:STOCK_US);
}

function renderStockCard(list){
  const el=document.getElementById('m1');
  el.innerHTML='';
  if(!jsonData?.market){el.innerHTML='<div class="no-data">데이터 없음</div>';return;}
  let firstKey=null;
  list.forEach(item=>{
    const m=jsonData.market[item.k];
    if(!m)return;
    if(!firstKey&&m.candles?.length>1)firstKey=item.k;
    const row=document.createElement('div');
    row.className='row';
    const c=cls(m.change);
    row.innerHTML='<span class="rn">'+item.l+'</span><span class="'+c+'">'+fmt(m.price)+' <small>'+sign(m.change)+fmt(m.pct)+'%</small></span>';
    el.appendChild(row);
  });
  if(firstKey){
    setTimeout(()=>makeMiniChart('cb1',jsonData.market[firstKey].candles,jsonData.market[firstKey].change>=0),50);
  }
}

function renderSection(mid,cbId,keys,labels){
  const el=document.getElementById(mid);
  el.innerHTML='';
  if(!jsonData?.market){el.innerHTML='<div class="no-data">데이터 없음</div>';return;}
  keys.forEach((k,i)=>{
    const m=jsonData.market[k];
    if(!m)return;
    const row=document.createElement('div');
    row.className='row';
    const c=cls(m.change);
    row.innerHTML='<span class="rn">'+labels[i]+'</span><span class="'+c+'">'+fmt(m.price)+' <small>'+sign(m.change)+fmt(m.pct)+'%</small></span>';
    el.appendChild(row);
  });
  const firstKey=keys.find(k=>jsonData.market[k]?.candles?.length>1);
  if(firstKey){
    const m=jsonData.market[firstKey];
    setTimeout(()=>makeMiniChart(cbId,m.candles,m.change>=0),50);
  }
}

function renderNews(tab){
  const el=document.getElementById('news');
  let items=allNews;
  if(tab!=='all')items=allNews.filter(n=>n.category===tab);
  if(!items.length){el.innerHTML='<div class="no-data">뉴스 없음</div>';return;}
  el.innerHTML='';
  items.forEach(item=>{
    const div=document.createElement('div');
    div.className='ni';
    const badge=item.category?'<span class="nbadge '+item.category+'">'+item.category+'</span>':'';
    div.innerHTML='<div class="ni-top"><span class="ns">'+item.source+'</span>'+badge+'</div><div class="nt" onclick="window.open(\''+item.link+'\',\'_blank\')">'+item.title+'</div>';
    el.appendChild(div);
  });
}

function filterNews(tab,btn){
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderNews(tab);
}

function buildThemes(){
  const el=document.getElementById('themes');
  el.innerHTML='';
  Object.keys(THEMES_DEF).forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='chip'+(i===0?' on':'');
    if(t==='실시간▲상승')btn.style.cssText='background:#fde8e8;color:#c84a31';
    if(t==='실시간▼하락')btn.style.cssText='background:#e8eef8;color:#1261c4';
    btn.textContent=t;
    btn.onclick=()=>{
      document.querySelectorAll('.chip').forEach(b=>{
        b.classList.remove('on');
        if(b.textContent==='실시간▲상승')b.style.cssText='background:#fde8e8;color:#c84a31';
        else if(b.textContent==='실시간▼하락')b.style.cssText='background:#e8eef8;color:#1261c4';
        else b.style.cssText='';
      });
      btn.classList.add('on');
      if(t==='실시간▲상승')btn.style.cssText='background:#c84a31;color:#fff';
      else if(t==='실시간▼하락')btn.style.cssText='background:#1261c4;color:#fff';
      loadStockTable(t);
    };
    el.appendChild(btn);
  });
}

async function loadStockTable(theme){
  const tbody=document.getElementById('stb');
  tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#bbb;padding:10px">로딩 중...</td></tr>';
  if(theme==='실시간▲상승'||theme==='실시간▼하락'){
    if(!kr50Cache.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#bbb;padding:10px">한국주요50 탭을 먼저 눌러주세요</td></tr>';return;}
    const sorted=[...kr50Cache].sort((a,b)=>theme==='실시간▲상승'?b.pct-a.pct:a.pct-b.pct);
    renderTableRows(sorted.slice(0,20));return;
  }
  if(theme==='한국주요50'){
    if(kr50Cache.length){renderTableRows(kr50Cache);return;}
    const fromJson=['samsung','hynix','hanwha','hyundai'].map(k=>{
      const m=jsonData?.market?.[k];if(!m)return null;
      const names={samsung:'삼성전자',hynix:'SK하이닉스',hanwha:'한화에어로',hyundai:'현대차'};
      const syms={samsung:'005930.KS',hynix:'000660.KS',hanwha:'012450.KS',hyundai:'005380.KS'};
      return{n:names[k],s:syms[k],p:m.price,c:m.change,pct:m.pct,vol:m.vol,h:m.high,l:m.low};
    }).filter(Boolean);
    if(fromJson.length)renderTableRows(fromJson);
    const results=await Promise.all(KR50.map(s=>yfetch(s.s,'1d','5d')));
    kr50Cache=[];
    KR50.forEach((s,i)=>{
      try{
        const meta=results[i].chart.result[0].meta;
        const p=meta.regularMarketPrice,prev=meta.chartPreviousClose,c=p-prev;
        kr50Cache.push({n:s.n,s:s.s,p,c,pct:c/prev*100,vol:meta.regularMarketVolume||0,h:meta.regularMarketDayHigh||0,l:meta.regularMarketDayLow||0});
      }catch(e){kr50Cache.push({n:s.n,s:s.s,p:0,c:0,pct:0,vol:0,h:0,l:0});}
    });
    renderTableRows(kr50Cache);return;
  }
  const list=THEMES_DEF[theme]||[];
  const results=await Promise.all(list.map(s=>yfetch(s.s,'1d','5d')));
  renderTableRows(list.map((s,i)=>{
    try{
      const meta=results[i].chart.result[0].meta;
      const p=meta.regularMarketPrice,prev=meta.chartPreviousClose,c=p-prev;
      return{n:s.n,s:s.s,p,c,pct:c/prev*100,vol:meta.regularMarketVolume||0,h:meta.regularMarketDayHigh||0,l:meta.regularMarketDayLow||0};
    }catch(e){return{n:s.n,s:s.s,p:0,c:0,pct:0,vol:0,h:0,l:0};}
  }));
}

function renderTableRows(rows){
  document.getElementById('stb').innerHTML=rows.map(d=>{
    const c=cls(d.pct);
    return '<tr><td onclick="openDetail(\''+d.n+'\',\''+d.s+'\')">'+d.n+'</td><td>'+(d.p?d.p.toLocaleString(undefined,{maximumFractionDigits:0}):'-')+'</td><td class="'+c+'">'+sign(d.c)+(d.c?d.c.toFixed(0):'-')+'</td><td class="'+c+'">'+sign(d.pct)+(d.pct?d.pct.toFixed(2):'-')+'%</td><td>'+(d.vol?(d.vol/1000).toFixed(0)+'K':'-')+'</td><td>'+(d.h?d.h.toLocaleString(undefined,{maximumFractionDigits:0}):'-')+'</td><td>'+(d.l?d.l.toLocaleString(undefined,{maximumFractionDigits:0}):'-')+'</td></tr>';
  }).join('');
}

async function loadETF(){
  const grid=document.getElementById('etf-grid');
  const tbody=document.getElementById('etftb');
  grid.style.gridTemplateColumns='repeat('+getEtfCols()+',1fr)';
  grid.innerHTML='';tbody.innerHTML='';
  const results=await Promise.all(ETF_LIST.map(s=>yfetch(s.s,'1d','5d')));
  ETF_LIST.forEach((d,i)=>{
    let price=0,chg=0,spark=[],vol='-';
    const jsonKey={SPY:'spy',QQQ:'qqq'}[d.s];
    if(jsonKey&&jsonData?.market?.[jsonKey]){const m=jsonData.market[jsonKey];price=m.price;chg=m.change;if(m.candles)spark=m.candles;}
    if(results[i]){
      try{
        const meta=results[i].chart.result[0].meta;
        price=meta.regularMarketPrice;chg=price-meta.chartPreviousClose;
        vol=((meta.regularMarketVolume||0)/1000).toFixed(0)+'K';
        const q=results[i].chart.result[0].indicators.quote[0];
        const ts=results[i].chart.result[0].timestamp||[];
        spark=ts.map((t,j)=>({time:t,close:q.close[j]||price})).filter(c=>c.close);
      }catch(e){}
    }
    if(!price)price=0;
    const pct=price?(chg/price*100).toFixed(2):'0.00';
    const c=cls(chg);const isUp=chg>=0;
    const card=document.createElement('div');
    card.className='etfc';
    card.innerHTML='<div class="etfn">'+d.n+'</div><div class="etfp">'+fmt(price,2)+'</div><div class="etfch '+c+'">'+sign(chg)+fmt(chg,2)+' '+sign(+pct)+pct+'%</div><div class="etf-spark" id="etfs'+i+'"></div>';
    grid.appendChild(card);
    const tr=document.createElement('tr');
    tr.innerHTML='<td>'+d.n+'</td><td>'+fmt(price,2)+'</td><td class="'+c+'">'+sign(chg)+fmt(chg,2)+'</td><td class="'+c+'">'+sign(+pct)+pct+'%</td><td>'+vol+'</td>';
    tbody.appendChild(tr);
    setTimeout(()=>{
      const el=document.getElementById('etfs'+i);
      if(!el||spark.length<2)return;
      const ch=LightweightCharts.createChart(el,{
        width:el.clientWidth||100,height:40,
        layout:{background:{color:'transparent'},textColor:'transparent'},
        grid:{vertLines:{color:'transparent'},horzLines:{color:'transparent'}},
        rightPriceScale:{visible:false},leftPriceScale:{visible:false},timeScale:{visible:false},
        crosshair:{mode:LightweightCharts.CrosshairMode.Hidden},
        handleScroll:false,handleScale:false,
      });
      const color=isUp?NAVER.up:NAVER.down;
      const s=ch.addAreaSeries({lineColor:color,topColor:isUp?NAVER.upBg:NAVER.downBg,bottomColor:'transparent',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
      s.setData(spark.map(c=>({time:c.time,value:c.close})).sort((a,b)=>a.time-b.time));
      ch.timeScale().fitContent();
      new ResizeObserver(()=>{if(el.clientWidth>0)ch.resize(el.clientWidth,40);}).observe(el);
    },150);
  });
  window.addEventListener('resize',()=>{grid.style.gridTemplateColumns='repeat('+getEtfCols()+',1fr)';});
}

async function openDetail(name,symbol){
  currentDetailSymbol=symbol;
  document.getElementById('d-name').textContent=name;
  document.getElementById('d-price').textContent='로딩 중...';
  document.getElementById('d-grid').innerHTML='';
  document.getElementById('period-summary').innerHTML='';
  document.getElementById('detail-panel').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  const code=symbol.replace('.KS','').replace('.KQ','');
  const isKR=symbol.includes('.KS')||symbol.includes('.KQ');
  document.getElementById('naver-link').href=isKR?'https://finance.naver.com/item/main.naver?code='+code:'https://finance.naver.com/world/sise.naver?symbol='+symbol;
  document.querySelectorAll('.detail-tab').forEach((b,i)=>{b.classList.toggle('on',i===0);});
  await loadDetailChart(symbol,'1d','5m');
}

async function loadDetailChart(symbol,range,interval){
  if(detailChartInst){try{detailChartInst.remove();}catch(e){}detailChartInst=null;}
  const wrap=document.getElementById('detail-chart-wrap');
  wrap.innerHTML='<div style="text-align:center;color:#bbb;padding:40px 0;font-size:12px">로딩 중...</div>';
  document.getElementById('period-summary').innerHTML='';
  const data=await yfetch(symbol,interval,range);
  if(!data){wrap.innerHTML='<div style="text-align:center;color:#bbb;padding:40px 0;font-size:12px">데이터 없음</div>';return;}
  try{
    const meta=data.chart.result[0].meta;
    const q=data.chart.result[0].indicators.quote[0];
    const ts=data.chart.result[0].timestamp||[];
    const closes=q.close||[],opens=q.open||[],highs=q.high||[],lows=q.low||[],vols=q.volume||[];
    const price=meta.regularMarketPrice,prev=meta.chartPreviousClose||price;
    const chg=price-prev,pct=chg/prev*100;
    const c=cls(chg),isUp=chg>=0,color=isUp?NAVER.up:NAVER.down;
    const validIdx=ts.map((_,i)=>i).filter(i=>closes[i]!=null);
    const firstClose=validIdx.length?closes[validIdx[0]]:prev;
    const lastClose=validIdx.length?closes[validIdx[validIdx.length-1]]:price;
    const periodHigh=validIdx.length?Math.max(...validIdx.map(i=>highs[i]||closes[i])):0;
    const periodLow=validIdx.length?Math.min(...validIdx.map(i=>lows[i]||closes[i])):0;
    const periodVol=validIdx.reduce((s,i)=>s+(vols[i]||0),0);
    const periodChg=lastClose-firstClose;
    const periodPct=firstClose?periodChg/firstClose*100:0;

    document.getElementById('d-price').innerHTML=
      '<span>'+price.toLocaleString(undefined,{maximumFractionDigits:2})+'</span>'+
      '<span class="'+c+'" style="font-size:14px;margin-left:8px">'+sign(chg)+chg.toFixed(2)+' ('+sign(pct)+pct.toFixed(2)+'%)</span>';

    const open=meta.regularMarketOpen||firstClose||prev;
    const high=meta.regularMarketDayHigh>0?meta.regularMarketDayHigh:periodHigh||prev;
    const low=meta.regularMarketDayLow>0?meta.regularMarketDayLow:periodLow||prev;
    const vol=meta.regularMarketVolume||periodVol;

    document.getElementById('d-grid').innerHTML=[
      {l:'시가',v:fmt(open,2)},
      {l:'고가',v:'<span style="color:'+NAVER.up+'">'+fmt(high,2)+'</span>'},
      {l:'저가',v:'<span style="color:'+NAVER.down+'">'+fmt(low,2)+'</span>'},
      {l:'거래량',v:vol?(vol/1000).toFixed(0)+'K':'-'},
      {l:'전일종가',v:fmt(prev,2)},
      {l:'등락률',v:'<span class="'+c+'">'+sign(pct)+pct.toFixed(2)+'%</span>'},
    ].map(x=>'<div class="detail-item"><div class="dl">'+x.l+'</div><div class="dv">'+x.v+'</div></div>').join('');

    wrap.innerHTML='';
    const chart=LightweightCharts.createChart(wrap,{
      width:wrap.clientWidth||320,height:220,
      layout:{background:{color:'#fff'},textColor:NAVER.text,fontSize:10},
      grid:{vertLines:{color:NAVER.grid},horzLines:{color:NAVER.grid}},
      rightPriceScale:{borderColor:NAVER.border,scaleMargins:{top:0.1,bottom:0.2}},
      timeScale:{borderColor:NAVER.border,timeVisible:true,secondsVisible:false},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    });
    if(interval==='5m'||interval==='1h'){
      const s=chart.addAreaSeries({lineColor:color,topColor:isUp?NAVER.upBg:NAVER.downBg,bottomColor:'transparent',lineWidth:1.5,priceLineVisible:true,lastValueVisible:true});
      s.setData(ts.map((t,i)=>({time:t,value:closes[i]??null})).filter(d=>d.value!==null).sort((a,b)=>a.time-b.time));
    }else{
      const cs=chart.addCandlestickSeries({upColor:NAVER.up,downColor:NAVER.down,borderUpColor:NAVER.up,borderDownColor:NAVER.down,wickUpColor:NAVER.up,wickDownColor:NAVER.down});
      cs.setData(ts.map((t,i)=>({time:t,open:opens[i]??closes[i],high:highs[i]??closes[i],low:lows[i]??closes[i],close:closes[i]??0})).filter(d=>d.close).sort((a,b)=>a.time-b.time));
      const vs=chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
      chart.priceScale('vol').applyOptions({scaleMargins:{top:0.8,bottom:0}});
      vs.setData(ts.map((t,i)=>({time:t,value:vols[i]||0,color:(closes[i]||0)>=(opens[i]||0)?'rgba(200,74,49,0.3)':'rgba(18,97,196,0.3)'})).filter(d=>d.value).sort((a,b)=>a.time-b.time));
    }
    chart.timeScale().fitContent();
    detailChartInst=chart;
    new ResizeObserver(()=>{if(wrap.clientWidth>0)chart.resize(wrap.clientWidth,220);}).observe(wrap);

    const pc=cls(periodChg);
    document.getElementById('period-summary').innerHTML=[
      {l:'기간 시작가',v:fmt(firstClose,2)},
      {l:'기간 최고가',v:'<span style="color:'+NAVER.up+'">'+fmt(periodHigh,2)+'</span>'},
      {l:'기간 최저가',v:'<span style="color:'+NAVER.down+'">'+fmt(periodLow,2)+'</span>'},
      {l:'기간 변동',v:'<span class="'+pc+'">'+sign(periodChg)+fmt(periodChg,2)+'</span>'},
      {l:'기간 등락률',v:'<span class="'+pc+'">'+sign(periodPct)+periodPct.toFixed(2)+'%</span>'},
      {l:'기간 거래량',v:periodVol?(periodVol/1000).toFixed(0)+'K':'-'},
    ].map(x=>'<div class="ps-item"><div class="pl">'+x.l+'</div><div class="pv">'+x.v+'</div></div>').join('');
  }catch(e){console.log('상세 차트 오류:',e);wrap.innerHTML='<div style="text-align:center;color:#bbb;padding:40px 0">차트 오류</div>';}
}

function detailTab(range,interval,btn){
  document.querySelectorAll('.detail-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  loadDetailChart(currentDetailSymbol,range,interval);
}

  document.getElementById('overlay').classList.remove('show');
  if(detailChartInst){try{detailChartInst.remove();}catch(e){}detailChartInst=null;}
}

  const now=jsonData?.updated?new Date(new Date(jsonData.updated).getTime()+9*3600000):new Date();
  document.getElementById('header-date').textContent=now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})+' 기준';
  document.getElementById('ai-comment').textContent=jsonData?.ai_comment||'시황 데이터를 불러오지 못했어요.';
  allNews=jsonData?.news||[];
  renderNews('all');
  renderStockCard(STOCK_KR);
  renderSection('m2','cb2',['kospi','kosdaq','dow','sp500','nasdaq','vix','dxy'],['코스피','코스닥','다우','S&P500','나스닥','VIX','달러지수']);
  renderSection('m3','cb3',['usdkrw','jpykrw','eurkrw','gbpkrw','cnykrw'],['달러/원','엔/원','유로/원','파운드/원','위안/원']);
  renderSection('m4','cb4',['gold','silver','brent','oil','natgas','copper'],['금','은','브렌트유','WTI','천연가스','구리']);
  buildThemes();
  await Promise.all([loadStockTable('한국주요50'),loadETF()]);
  const upd=jsonData?.updated?new Date(new Date(jsonData.updated).getTime()+9*3600000).toLocaleString('ko-KR'):new Date().toLocaleString('ko-KR');
  document.getElementById('upd').textContent='마지막 업데이트: '+upd+' (KST)';
}
